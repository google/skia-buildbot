## RecreatePageSetsTasks ##

# To make sure user does not exceed max CT tasks.
- kind: RecreatePageSetsTasks
  properties:
  - name: TaskDone
  - name: Username
  - name: Id
    direction: desc

# For run history page.
- kind: RecreatePageSetsTasks
  properties:
  - name: IsTestPageSet
  - name: Id
    direction: desc
- kind: RecreatePageSetsTasks
  properties:
  - name: Username
  - name: Id

# For displaying queue size.
- kind: RecreatePageSetsTasks
  properties:
  - name: TaskDone
  - name: Id
    direction: desc

# For repeating runs.
- kind: RecreatePageSetsTasks
  properties:
  - name: TaskDone
  - name: RepeatAfterDays
  - name: Id
    direction: desc

