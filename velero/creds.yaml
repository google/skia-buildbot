apiVersion: apps/v1beta1
kind: Deployment
metadata:
  name: velero
spec:
  template:
    spec:
      containers:
        - name: velero
          env:
          - name: GOOGLE_APPLICATION_CREDENTIALS
            value: /var/secrets/google/key.json
          volumeMounts:
          - name: velero-backup
            mountPath: /var/secrets/google
      volumes:
      - name: cloud-credentials
        secret:
          secretName: velero-backup
