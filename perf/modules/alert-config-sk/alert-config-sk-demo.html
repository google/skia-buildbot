<!DOCTYPE html>
<html>
<head>
  <title>alert-config-sk</title>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <h1>alert-config-sk</h1>
  <alert-config-sk></alert-config-sk>

  <h2>Events</h2>
  <pre id=events></pre>
  <script type="text/javascript" charset="utf-8">
    document.querySelector('alert-config-sk').addEventListener('some-event-name', (e) => {
      document.querySelector('#events').textContent = JSON.stringify(e.detail, null, '  ');
    });
  </script>
</body>
</html>
