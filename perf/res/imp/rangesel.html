<!-- The <range-sel-sk> custom element declaration.

Allows selecting a sub-range. The full range is from [0, 100].

  [......(=====)........]

  Attributes:
    begin - Number - The start of the selected range.
    end   - Number - The end of the selected range.

  Events:
    range-change

  Methods:

-->

<dom-module id="range-sel-sk">
  <style>
    :host {
      display: block;
      position: relative;
      width: 640px;
      height: 40px;
    }

    :host,
    div {
      user-select: none;
      -webkit-user-select: none;
    }

    #begin,
    #end {
      width: 15px;
      height: 38px;
      background: #1F78B4;
      border: solid 1px #eee;
      display: inline-block;
      position: absolute;
      border-radius: 5px;
    }

    #begin:hover,
    #end:hover {
      border: solid 1px #1F78B4;
    }

    #fullrange,
    #range {
      width: 100%;
      height: 2px;
      background: #ccc;
      top: 20px;
      display: inline-block;
      position: absolute;
    }

    #range {
      background: #1F78B4;
      top: 20px;
      left: 15%;
      width: 36%;
    }

  </style>
  <template>
    <div id=fullrange></div>
    <div id=range></div>
    <div id=begin on-track="_handleTrack"></div>
    <div id=end on-track="_handleTrack"></div>
  </template>
</dom-module>

<script>
  Polymer({
    is: "range-sel-sk",

    properties: {
      begin: {
        type: Number,
        value: 15,
        reflectToAttribute: true,
      },
      end: {
        type: Number,
        value: 47,
        reflectToAttribute: true,
      },
    },

    ready: function() {
      // Don't go outside the control bounds.
      //
      // Let A pass B?
      this._setSliderPos(this.$.begin, 0);
      this._setSliderPos(this.$.end, 0);
    },

    _setSliderPos: function(ele, dx) {
      if (ele.offsetLeft+dx > this.clientWidth) {
        dx = this.clientWidth - ele.offsetLeft;
      }
      if (ele.offsetLeft+dx < 0) {
        dx = -ele.offsetLeft;
      }
      ele.style.left = this[ele.id] + "%";
      ele.style.transform = "translateX(" + dx + "px)";
      this.$.range.style.left = this.begin + "%";
      this.$.range.style.width = (this.end - this.begin) + "%";
    },

    _handleTrack: function(e) {
      switch(e.detail.state) {
        // Maybe on 'begin' we track window select events for text selection
        // and reject them?
        case 'track':
          this._setSliderPos(e.srcElement, e.detail.dx);
          break;
        case 'end':

      if (e.srcElement.offsetLeft+e.detail.dx > this.clientWidth) {
        e.detail.dx = this.clientWidth - e.srcElement.offsetLeft;
      }
      if (e.srcElement.offsetLeft+e.detail.dx < 0) {
        e.detail.dx = -e.srcElement.offsetLeft;
      }

          this.set(e.srcElement.id, 100*(e.srcElement.offsetLeft+e.detail.dx)/this.clientWidth);
          this._setSliderPos(e.srcElement, 0);
          this.fire("range-change", {begin: this.begin, end: this.end});
          break;
      }
    },

  });
</script>
