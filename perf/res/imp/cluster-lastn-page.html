<script>
  Polymer({
    is: "cluster-lastn-page-sk",

    ready: function() {
    },

    properties: {
      cfg: {
        type: Object,
        value: {},
        reflectToAttribute: false,
        observer: "cfgChange",
      },
      domain: {
        type: Object,
        value: () => ({
          end: Date.now()/1000,
          num_commits: 200,
          request_type: 1,
        }),
        reflectToAttribute: false,
        observer: "domainChange",
      }
    },

  });
</script>
