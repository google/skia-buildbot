<!-- The <alerts-page-sk> custom element declaration.

  A page for editing all the alert configs.

  Attributes:
  Events:
  Methods:
-->

<link rel="import" href="/res/imp/bower_components/iron-flex-layout/iron-flex-layout-classes.html">
<link rel="import" href="/res/imp/bower_components/iron-icon/iron-icon.html">
<link rel="import" href="/res/imp/bower_components/iron-icons/iron-icons.html">
<link rel="import" href="/res/imp/bower_components/paper-dialog/paper-dialog.html">

<link rel="import" href="/res/imp/alert-config.html" />

<dom-module id="alerts-page-sk">
  <style include="iron-flex iron-flex-alignment iron-positioning">
  </style>
  <template>
    <!--
    One row per config.
    Edit and delete buttons.
    Editing is done via dialog.
    Columns include:
      id
      query
      owner
   Checkbox to show deleted configs.
    -->
    <template is="dom-repeat" items="{{_alerts}}">
      <div>
        {{item.id}}
      </div>
    </template>
  </template>
</dom-module>

<script>
  Polymer({
    is: "alerts-page-sk",

    properties: {
      _alerts: {
        type: Array,
        value: function() { return []; },
        reflectToAttribute: false,
      },
    },

    ready: function() {
      sk.get('/_/alert/list').then(JSON.parse).then(function(json) {
        this.set('_alerts', json);
      }.bind(this)).catch(sk.errorMessage);
    },

  });
</script>
