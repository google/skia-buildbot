<!-- The <json-source> custom element declaration.

  Attributes:
  Events:
  Methods:
-->
<link rel="import" href="/res/imp/bower_components/paper-spinner/paper-spinner.html">

<dom-module id="json-source">
  <style>
    button,
    paper-spinner {
      display: inline-block;
    }

    paper-spinner {
      margin-top: 0.6em;
      margin-bottom: -0.6em;
    }
  </style>
  <template>
    <div>
      <button on-click="_loadSource">View Source File</button>
      <paper-spinner id=spinner></paper-spinner>
    </div>
    <pre id=display></pre>
  </template>
</dom-module>

<script>
  Polymer({
    is: "json-source",

    properties: {
      cid: {
        type: Object,
        value: function() { return {}; },
        reflectToAttribute: false,
        observer: "_clear",
      },
      traceid: {
        type: String,
        value: "",
        reflectToAttribute: false,
        observer: "_clear",
      },
    },

    _loadSource: function() {
      if (this.traceid == "") {
        return
      }
      if (this.cid.offset == undefined) {
        return
      }
      var body = {
        offset: this.cid.offset,
        source: this.cid.source,
        traceid: this.traceid,
      };
      this.$.spinner.active = true;
      sk.post("/_/details/", JSON.stringify(body)).then(function(text){
        this.$.display.textContent = text;
        this.$.spinner.active = false;
      }.bind(this)).catch(function(e) {
        this.$.spinner.active = false;
        sk.errorMessage(e);
      }.bind(this));
    },

    _clear: function() {
        this.$.display.textContent = "";
    },

    ready: function() {
    },

  });
</script>
