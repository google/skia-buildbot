<!-- The <day-range-sk> custom element declaration.

  Allows picking a range of time from the last year.

  Attributes:
    begin - The beginning of the selected time range, given in seconds
       since the Unix epoch.
    end - The end of the selected time range, given in seconds
       since the Unix epoch.

  Events:
    day-range-change - Fired then the selection has stopped changing. Contains
      the begin and end timestamps in the details:

      {
        begin: 1470084997,
        end: 1474184677
      }

  Methods:
    None.
-->

<link rel="import" href="/res/imp/bower_components/vaadin-date-picker/vaadin-date-picker.html">

<dom-module id="day-range-sk">
  <style include="iron-flex iron-flex-alignment iron-positioning">
    :host {
      position: relative;
    }

    vaadin-date-picker {
      display: inline-block;
    }
  </style>
  <template>
    <div class="layout horizontal around-justified">
      <vaadin-date-picker on-value-changed=_beginCtrlChange id=begin max="[[_end]]"   value="{{_begin}}" label=Begin></vaadin-date-picker>
      <vaadin-date-picker on-value-changed=_endCtrlChange id=end   min="[[_begin]]" value="{{_end}}" label=End></vaadin-date-picker>
    </div>
  </template>
</dom-module>

<script>
  (function () {

    Polymer({
      is: "day-range-sk",

      properties: {
        _begin: {
          type: String,
          value: "",
        },
        _end: {
          type: String,
          value: "",
        },
        begin: {
          type: Number,
          value: 0,
          reflectToAttribute: true,
          observer: "_beginChange",
        },
        end: {
          type: Number,
          value: 0,
          reflectToAttribute: true,
          observer: "_endChange",
        },
      },

      _beginChange: function() {
        this._begin = new Date(this.begin*1000).toISOString().slice(0, 10);
      },

      _endChange: function() {
        this._end = new Date(this.end*1000).toISOString().slice(0, 10);
      },

      _beginCtrlChange: function(e) {
        if (e.detail.value != "1970-01-01") {
          console.log(e.detail.value);
        }
      },

      _endCtrlChange: function(e) {
        if (e.detail.value != "1970-01-01") {
          console.log(e.detail.value);
        }
      },

      ready: function() {
      },

    });
  })();
</script>
