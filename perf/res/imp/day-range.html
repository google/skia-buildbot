<!-- The <day-range-sk> custom element declaration.

  Allows picking a range of time from the last year.

  Attributes:
    begin - The beginning of the selected time range, given in seconds
       since the Unix epoch.
    end - The end of the selected time range, given in seconds
       since the Unix epoch.

  Events:
    day-range-change - Fired then the selection has stopped changing. Contains
      the begin and end timestamps in the details:

      {
        begin: 1470084997,
        end: 1474184677
      }

  Methods:
    None.
-->

<link rel="import" href="/res/common/imp-npm/date-picker-sk.html" />

<dom-module id="day-range-sk">
  <style>
    :host {
      position: relative;
    }

    label {
      display: inline-block;
      min-width: 3em;
    }
  </style>
  <template>
    <p>
      <label for=begin>Begin</label>
      <date-picker-sk id=begin on-date-changed=_beginDateChanged date=[[begin]] ></date-picker-sk>
    </p>
    <p>
      <label for=end>End</label>
      <date-picker-sk id=end on-date-changed=_endDateChanged date=[[end]]></date-picker-sk>
    </p>
  </template>
</dom-module>

<script>
  (function () {
    Polymer({
      is: "day-range-sk",

      properties: {
        begin: {
          type: Number,
          value: 0,
          reflectToAttribute: true,
        },
        end: {
          type: Number,
          value: 0,
          reflectToAttribute: true,
        },
        now: {
          type: Date,
          value: Date.now(),
        },
      },

      ready: function() {
      },

      _beginDateChanged: function(e) {
        this.begin = e.detail.date;
        this._triggerEvent();
      },

      _endDateChanged: function(e) {
        this.end = e.detail.date;
        this._triggerEvent();
      },

      _triggerEvent: function() {
         var msg = {
           begin: this.begin,
           end: this.end,
         };
        this.fire("day-range-change", msg);
      },

    });
  })();
</script>
