<!-- The <day-range-sk> custom element declaration.

  Allows picking a range of time from the last year.

  Attributes:
    begin - The beginning of the selected time range, given in seconds
       since the Unix epoch.
    end - The end of the selected time range, given in seconds
       since the Unix epoch.

  Events:
    day-range-change - Fired then the selection has stopped changing. Contains
      the begin and end timestamps in the details:

      {
        begin: 1470084997,
        end: 1474184677
      }

  Methods:
    None.
-->

<link rel="import" href="/res/imp/bower_components/paper-date-picker-item/paper-datetime-picker-item.html">
<link rel="import" href="/res/imp/bower_components/paper-dialog/paper-dialog.html">

<dom-module id="day-range-sk">
  <style include="iron-flex iron-flex-alignment iron-positioning">
    :host {
      position: relative;
    }

    paper-dialog {
      padding: 1em;
      width: 60em;
    }

    vaadin-date-picker {
      display: inline-block;
    }
  </style>
  <template>
    <div>Begin: [[begin]] End: [[end]]</div>
    <button on-tap="_edit">Edit</button>
    <paper-dialog id=edit on-iron-overlay-closed=_onDialogClose>
      <paper-datetime-picker-item on-date-changed=_beginCtrlChange id=begin date="{{_begin}}" label=Begin></paper-datetime-picker-item>
      <paper-datetime-picker-item on-date-changed=_endCtrlChange   id=end date="{{_end}}"     label=End></paper-datetime-picker-item>
      <div class="buttons">
        <paper-button dialog-dismiss>Cancel</paper-button>
        <paper-button dialog-confirm autofocus>Accept</paper-button>
      </div>
    </paper-dialog>
  </template>
</dom-module>

<script>
  (function () {

    Polymer({
      is: "day-range-sk",

      ready: function() {
      },

      properties: {
        _begin: {
          type: Date,
          value: new Date(),
        },
        _end: {
          type: Date,
          value: new Date(),
        },
        begin: {
          type: Number,
          value: 0,
          reflectToAttribute: true,
          observer: "_beginChange",
        },
        end: {
          type: Number,
          value: 0,
          reflectToAttribute: true,
          observer: "_endChange",
        },
      },

      _edit: function() {
        this.$.edit.open();
      },

      _onDialogClose: function(e) {
        if (!e.detail.confirmed) {
          return
        }
        this.begin = this._begin.valueOf()/1000;
        this.end = this._end.valueOf()/1000;
        var detail = {
          begin: this.begin,
          end: this.end,
        }
        this.dispatchEvent(new CustomEvent('day-range-change', { detail: detail, bubbles: true }));
      },

      _beginChange: function() {
        this._begin = new Date(this.begin*1000);
      },

      _endChange: function() {
        this._end = new Date(this.end*1000);
      },

      _beginCtrlChange: function(e) {
        console.log(e.detail.value);
      },

      _endCtrlChange: function(e) {
        console.log(e.detail.value);
      },

    });
  })();
</script>
