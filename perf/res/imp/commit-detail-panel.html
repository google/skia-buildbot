<!-- The <commit-detail-panel-sk> custom element declaration.

  Attributes:
    None.

  Events:
    None.

  Methods:
    setCommitDetail(d) - Where d is an Array of serialized cid.CommitDetail.
-->

<dom-module id="commit-detail-panel-sk">
  <style>
    pre,
    span {
      margin: 0;
    }

    a {
      color: #FF7F00;
      font-weight: bold;
    }
  </style>
  <template>
    <template is="dom-repeat" items="{{_details}}">
      <pre><span>[[_trimPad(item.author)]]</span> <span>[[_humanize(item.ts)]]</span> <span><a href$="[[item.url]]">[[_trimNewline(item.message)]]</a></span> <span>[[_trimNewline(commit.desc)]]</span></pre>
    </template>
  </template>
</dom-module>

<script>
  Polymer({
    is: "commit-detail-panel-sk",

    properties: {
      _details: {
        type: Array,
        value: function() { return []; },
        reflectToAttribute: false,
      },
    },

    setCommitDetail: function(details) {
      this.set('_details', details);
    },

    _humanize: function (s) {
      if (!this.commit) {
        return "";
      }
      return sk.human.diffDate(s * 1000);
    },

    _trimPad: function(s) {
      if (!this.commit) {
        return "Unknown commit."
      }
      s = s.slice(0, 30);
      while (s.length < 30) {
        s = s + " ";
      }
      return s;
    },

    _trimNewline: function(s) {
      if (!s) {
        return "";
      }
      return this._trimPad(s.split("\n")[0]);
    },

  });
</script>
