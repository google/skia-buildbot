syntax = "proto3";

package autobisection.v1;
option go_package = "go.skia.org/infra/perf/go/autobisection/proto/v1";

// AutobisectionService provides an interface for interacting with the Autobisection store.
service AutobisectionService {
  // SaveAutobisection saves the result of a autobisection.
  rpc SaveAutobisection(SaveAutobisectionRequest) returns (SaveAutobisectionResponse) {}
}

enum RegressionStatus {
  UNSPECIFIED = 0;
  INSIGNIFICANT = 1;
  NO_CULPRIT_FOUND = 2;
  FOUND_CULPRITS = 3;
}

// Request object for SaveAutobisection rpc.
message SaveAutobisectionRequest {
  string job_id = 1;
  string anomaly_group_id = 2;
  string anomaly_id = 3;
  reserved 4;
  string workflow_id = 5;
  RegressionStatus regression_status = 6;
}

// Response object for SaveAutobisection rpc.
message SaveAutobisectionResponse {}
