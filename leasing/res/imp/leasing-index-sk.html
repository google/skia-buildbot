<link rel="import" href="/res/imp/bower_components/iron-flex-layout/iron-flex-layout-classes.html">
<link rel="import" href="/res/common/imp/app-sk.html" />
<link rel="import" href="leasing-menu-sk.html" />
<link rel="import" href="leasing-selections-sk.html" />

<dom-module id="leasing-index-sk">
  <template>
    <style is="custom-style" include="iron-positioning">
      app-sk {
        --app-sk-main: {
          background-color: #FFFFFF;
          font-family: sans-serif;
        };
        --app-sk-toolbar: {
          background-color: #3f51b5;
        };
        login-sk{
          --login-sk-color: white;
        };
      }
      .title {
        padding:2px;
        margin-top:5px;
      }
      .title {
        display:inline;
        font-size: 1.5em;
        -webkit-margin-before: 0.83em;
        -webkit-margin-after: 0.83em;
        -webkit-margin-start: 0px;
        -webkit-margin-end: 0px;
        font-weight: bold;
      }
    </style>

    <app-sk class="fit" header_height="60px">
      <span header class="title">Leasing Server for Swarming Bots</span>
      <leasing-menu-sk navigation></leasing-menu-sk>
      <leasing-selections-sk os-types="{{osTypes}}" device-types="{{deviceTypes}}"></leasing-selections-sk>
      <!--
      <fuzzer-status-sk rtoolbar></fuzzer-status-sk>
      <fuzzer-menu-sk navigation></fuzzer-menu-sk>

      <fuzzer-summary-sk></fuzzer-summary-sk>
      -->
    </app-sk>
  </template>
  <script>
    Polymer({
      is: 'leasing-index-sk',
      properties: {
        osTypes: {
          type: Object,
          value: {},
        },
        deviceTypes: {
          type: Object,
          value: {},
        },
      },
    });
  </script>
</dom-module>
