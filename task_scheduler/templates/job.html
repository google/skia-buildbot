{{template "header.html"}}

<job-sk id="job-sk"></job-sk>
<script>
// Add Job info from the server to the job-sk.
var data = JSON.parse({{.Data}});
var j = document.getElementById("job-sk");
j.setJob(data.job);
j.setTasks(data.tasks);
j.setGraph(data.depGraph);
</script>
