---
# Install all available updates from Windows Update.
- hosts: all
  tasks:
  - name: Enable Windows Update
    win_service:
      name: wuauserv
      start_mode: manual
  - name: Install updates and reboot
    win_updates:
      category_names:
        # All categories.
        - Application
        - Connectors
        - DefinitionUpdates
        - DeveloperKits
        - FeaturePacks
        - Guidance
        - ServicePacks
        - Tools
        - UpdateRollups
        - CriticalUpdates
        - SecurityUpdates
      reboot: yes
    register: result
    until: result.found_update_count == 0
    retries: 5
  - name: Disable Windows Update
    win_service:
      name: wuauserv
      start_mode: disabled
      state: stopped
