---
# Run disk cleanup on C.
- hosts: all
  tasks:
  - name: Set registry keys for automated disk cleanup
    # Based on https://github.com/deekayen/ansible-role-cleanmgr/blob/master/tasks/main.yml which is
    # in turn based on
    # https://stackoverflow.com/questions/28852786/automate-process-of-disk-cleanup-cleanmgr-exe-without-user-intervention#35214197
    win_regedit:
      path: HKLM:\Software\Microsoft\Windows\CurrentVersion\Explorer\VolumeCaches\{{ item }}
      name: StateFlags0001
      type: dword
      data: 2
      state: present
    loop:
      - Active Setup Temp Folders
      - BranchCache
      - Downloaded Program Files
      - Internet Cache Files
      - Memory Dump Files
      - Old ChkDsk Files
      - Previous Installations
      - Recycle Bin
      - Service Pack Cleanup
      - Setup Log Files
      - System error memory dump files
      - System error minidump files
      - Temporary Files
      - Temporary Setup Files
      - Thumbnail Cache
      - Upgrade Discarded Files
      - User file versions
      - Windows Defender
      - Windows Error Reporting Archive Files
      - Windows Error Reporting Queue Files
      - Windows Error Reporting System Archive Files
      - Windows Error Reporting System Queue Files
      - Windows ESD installation files
      - Update Cleanup
      - Windows Upgrade Log Files
  - name: Run disk cleanup
    win_command: CleanMgr.exe /sagerun:1
  - name: Wait for disk cleanup to finish
    win_shell: Get-Process -Name cleanmgr,dismhost -ErrorAction SilentlyContinue | Wait-Process
  - name: Reboot to finish Update cleanup
    win_reboot:
