---
- hosts: all
  connection: local
  remote_user: chrome-bot
  become_user: root
  become: yes
  become_method: sudo
  vars:
    nfs_mount_point_prod: /opt/prod
    nfs_mount_point_stage: /opt/stage
    image_prod: /opt/rpi_img/prod.img
    image_stage: /opt/rpi_img/stage.img
    # 8192 * 512
    offset_boot: 4194304
    # 131072 * 512
    offset_root: 67108864
    # 122880 * 512
    sizelimit_boot: 62914560
    # 4624384 * 512
    sizelimit_root: 2367684608
  tasks:
    - file: path={{nfs_mount_point_prod}}/boot state=directory
    - file: path={{nfs_mount_point_prod}}/root state=directory
    - file: path={{nfs_mount_point_stage}}/boot state=directory
    - file: path={{nfs_mount_point_stage}}/root state=directory

    - mount: src="{{image_prod}}" name="{{nfs_mount_point_prod}}/boot" fstype="auto" opts="loop,offset={{offset_boot}},sizelimit={{sizelimit_boot}},noauto" state="mounted"
    - mount: src="{{image_prod}}" name="{{nfs_mount_point_prod}}/root" fstype="auto" opts="loop,offset={{offset_root}},sizelimit={{sizelimit_root}},noauto" state="mounted"
    - mount: src="{{image_stage}}" name="{{nfs_mount_point_stage}}/boot" fstype="auto" opts="loop,offset={{offset_boot}},sizelimit={{sizelimit_boot}},noauto" state="mounted"
    - mount: src="{{image_stage}}" name="{{nfs_mount_point_stage}}/root" fstype="auto" opts="loop,offset={{offset_root}},sizelimit={{sizelimit_root}},noauto" state="mounted"

    # start nfs
    - service: name=nfs-kernel-server state=restarted

    # make sure root stays mounted
    - lineinfile: dest=/etc/cron.d/opt_raspberrypi_root line="* * * * * root /bin/mount {{nfs_mount_point_prod}}/root" create=yes state=present
    - lineinfile: dest=/etc/cron.d/opt_raspberrypi_root line="* * * * * root /bin/mount {{nfs_mount_point_stage}}/root" create=yes state=present

    # Remount these at startup
    - lineinfile: dest=/etc/rc.local line="mount {{nfs_mount_point_prod}}/root" insertbefore="exit 0" create=yes
    - lineinfile: dest=/etc/rc.local line="mount {{nfs_mount_point_prod}}/boot" insertbefore="exit 0" create=yes
    - lineinfile: dest=/etc/rc.local line="mount {{nfs_mount_point_stage}}/root" insertbefore="exit 0" create=yes
    - lineinfile: dest=/etc/rc.local line="mount {{nfs_mount_point_stage}}/boot" insertbefore="exit 0" create=yes
