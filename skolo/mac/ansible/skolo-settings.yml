---
# Set up the machine to run our tests.
- hosts: all
  remote_user: chrome-bot
  become: yes

  tasks:
    - name: Setup caffeinated.
      copy:
        src: ../org.skia.caffeinated.plist
        dest: /Library/LaunchAgents/
    - name: Add reboot command to sudoers for chrome-bot
      lineinfile:
        path: /private/etc/sudoers.d/swarming
        state: present
        create: yes
        line: 'chrome-bot ALL=NOPASSWD:/sbin/shutdown -r now'
        validate: '/usr/sbin/visudo -cf %s'
    - name: Add poweroff command to sudoers for chrome-bot
      lineinfile:
        path: /private/etc/sudoers.d/swarming
        state: present
        create: yes
        line: 'chrome-bot ALL=NOPASSWD:/sbin/shutdown -h now'
        validate: '/usr/sbin/visudo -cf %s'
