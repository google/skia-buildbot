apiVersion: extensions/v1beta1
kind: Ingress
metadata:
  name: basic-ingress
  annotations:
    kubernetes.io/ingress.global-static-ip-name: skiatest-org-central1
    ingress.gcp.kubernetes.io/pre-shared-cert: skiatest
spec:
  backend:
    serviceName: web2
    servicePort: 8080
  rules:
    - host: docs.skiatest.org
      http:
        paths:
        - backend:
            serviceName: docserver2
            servicePort: 8000
    - host: web.skiatest.org
      http:
        paths:
        - backend:
            serviceName: web
            servicePort: 8080
    - host: prom.skiatest.org
      http:
        paths:
        - backend:
            serviceName: prometheus
            servicePort: 8080
    - host: alerts.skiatest.org
      http:
        paths:
        - backend:
            serviceName: alertmanager
            servicePort: 8080
