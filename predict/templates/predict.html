<!DOCTYPE html>
<html>
  <head>
    <title>Predictions</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=egde,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style type="text/css" media="screen">
      h1 {
        grid-area: header;
        margin: 0;
        padding: 0;
        color: white;
        background: #1F78B4;
        padding: 0.2em;
      }

      #files {
        grid-area: files;
        padding: 1em;
      }

      #summary {
        grid-area: summary;
        padding: 1em;
      }

      body {
        font: 400 16px/1.5 "Helvetica Neue", Helvetica, Arial, sans-serif;
        margin: 0;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 64px 1fr;
        grid-template-areas:
        "header header"
        "files summary"
      }

      ul li {
        list-style: none;
      }
    </style>
  </head>
  <body>
    <h1>Predict</h1>
    <section id=files>
      <h2>Files</h2>
      <ol>
      {{ range .Files}}
        <li>{{ . }} </li>
      {{ end }}
      </ol>
    </section>
    <section id=summary>
      <h2>Summary</h2>
      <ul>
      {{ range .Prediction }}
        <li>{{ .Count }} - {{ .BotName }}</li>
      {{ end }}
      </ul>
    </section>
  </body>
</html>
