<!-- The <ctsdetails-page-sk> custom element declaration.

  An element to display the details from a single skia CTS run.

  Attributes:
    None

  Methods:
    pageSelected: This function has to be called if the page is selected by the router.
    pageDeselected: This function has to be called if the page is deselected by the router.

  Events:
    None

  Mailboxes:
    None

-->

<link rel="import" href="bower_components/iron-flex-layout/iron-flex-layout-classes.html">
<link rel="import" href="bower_components/polymer/polymer.html">

<link rel="import" href="activity-sk.html">
<link rel="import" href="cts-device-sk.html">
<link rel="import" href="shared-styles.html">

<dom-module id="ctsdetails-page-sk">
  <template>
  <style is="custom-style" include="iron-flex iron-flex-alignment"></style>
    <style include="shared-styles">
      .resultHeader {
        padding: 1em;
        margin-bottom: 1em;
        border: 1px solid #CCCCCC;
        width: 50em;
      }

      .pageContainer {
        padding: 2em;
      }

      .passed {
        color: #117733;
        background-color: white;
        font-weight: bold;
      }

      .failed {
        color: #D95F02;
        background-color: white;
        font-weight: bold;
      }

      .fieldLabel {
        font-weight: bold;
        margin-right: 2em;
        min-width: 15em;
      }
    </style>

    <div class="pageContainer">
      <activity-sk id="activityCTSDetails" busy="{{_hideAll}}"></activity-sk>
      <div class="detailContainer" hidden$="[[_hideAll]]">
        <div class="resultHeader layout vertical">
            <div class="layout horizontal"><div class="fieldLabel">Date/Time:</div><div>[[_humanDate(_data.ts)]]</div></div>
            <div class="layout horizontal"><div class="fieldLabel">ID:</div><div>[[_data.id]]</div></div>
            <div class="layout horizontal"><div class="fieldLabel">#Device/Versions:</div><div class="numCol">[[_data.deviceCount]]</div></div>
            <div class="layout horizontal"><div class="fieldLabel">#Fail</div><div class="numCol">[[_data.failCount]]</div></div>
            <div class="layout horizontal"><div class="fieldLabel">#Pass</div><div class="numCol">[[_data.passCount]]</div></div>
            <div class="layout horizontal"><div class="fieldLabel">Result</div><div class$="[[_passFailStr(_data)]] resultCol">[[_passFailStr(_data)]]</div></div>
        </div>
        <template is="dom-repeat" items="{{_data.devices}}">
          <cts-device-sk device="[[item]]"></cts-device-sk>
        </template>
      </div>
    </div>
    <zoom-dialog-sk></zoom-dialog-sk>
  </template>

  <script>
    Polymer({
      is: "ctsdetails-page-sk",

      properties: {
        _id: {
          type: String,
          value: ""
        },

        _data: {
          type: Object,
          value: function() { return {}; }
        }
      },

      behaviors: [gold.ZoomTargetBehavior],

      ready: function() {
        this.listen(this, 'zoom-clicked', '_handleZoomClicked');
      },

      pageSelected: function(ctx) {
        this.set('_id', ctx.params.id);
        this._load();
      },

      pageDeselected: function() {},

      _load: function() {
        this.$.activityCTSDetails.startSpinner("Loading ...");
        var url = '/json/ctsresult/' + this._id;
        sk.get(url).then(JSON.parse).then(function (json) {
          this.set('_data', json);
          this.$.activityCTSDetails.stopSpinner();
        }.bind(this)).catch(function(e) {
          sk.errorMessage(e);
          this.$.activityCTSDetails.stopSpinner();
        }.bind(this));
      },

      _humanDate: function (timeStampMS) {
        return sk.human.localeTime(new Date(timeStampMS));
      },

      _passFailStr: function(testRun) {
        return (testRun.deviceCount == testRun.passCount) ? 'passed' : 'failed';
      }
    });
  </script>
</dom-module>
