<!-- The <dots2-sk> custom element declaration.

  A custom element for displaying a dot chart of digests by trace, such as:

    ooo-o-o-oo•••


  Attributes:
    None.

  Events:
    show-commits - Event generated when a dot is clicked.
      e.detail contains a slice of commits that could have
      made up that dot.

    hover - Event generated when the mouse hovers over a trace.
      e.detail is the trace id.

  Methods:
    setValue(value) - Where value is an object of the form:

      {
        tileSize: 50,
        traces: [
          {
            label: "some:trace:id",
            data: [
              {
                x: 2, // Commit index.
                y: 0, // Trace index.
                s: 0  // Color code.
              },
              { x: 5, y: 0, s: 1 },
              ...
            ],
          },
          ...
        ]
      }

      Where s is a color code, 0 is the target digest, while
      1-6 indicate unique digests that are different from
      the target digest. A code of 7 means that there are more
      than 7 unique digests in the trace and all digests
      after the first 7 unique digests are represented by
      this code.

    highlight(index, b) - Highlight all digests at the given index
      if b is true, else remove the highlight at that index.

    setCommits(commits) - Where commits is an array of commits:

      [
        {
          author: "committer@example.org"
          commit_time: 1428445634
          hash: "c654e9016a15985ebeb24f94f819d113ad48a251"
        },
        ...
      ]

-->
<link rel="import" href="dot-styles.html">

<dom-module id="dots2-sk">
  <template>
    <canvas id="dots" width=0 height=0></canvas>
  </template>
  <script>
    (function () {

      var STROKE_WIDTH = 2;
      var DOT_RADIUS = 3;
      var DOT_SCALE_X = 10;
      var DOT_SCALE_Y = 10;
      var DOT_OFFSET_X = 10;
      var DOT_OFFSET_Y = 10;

      Polymer({
        is: "dots2-sk",

        properties: {
          value: {
            type: Object,
            value: function() { return { tileSize: 0, traces: [] }; }
          }
        },

        ready: function() {
          this.highlightIndex = -1;
          this.commits = [];
          this.hover =  {x:-1, y:-1};
          this.listen(this.$.dots, 'mousemove', '_onMouseMove');
          this.listen(this.$.dots, 'mousedown', '_onMouseDown');
          this.ctx = this.$.dots.getContext('2d');
          this.strokeColors = [
            '#000000',
            '#1B9E77',
            '#D95F02',
            '#7570B3',
            '#E7298A',
            '#66A61E',
            '#E6AB02',
            '#A6761D',
            '#999999',
          ];
        },

        setValue: function(value) {
          if (!value || (value.tileSize === 0)) {
            return;
          }

          this.value = value;
          this._draw();
        },

        _draw: function() {
          var width = this.value.tileSize * DOT_SCALE_X + 2 * DOT_OFFSET_X;
          var height = this.value.traces.length * DOT_SCALE_Y + 2 * DOT_OFFSET_Y;
          let x = x => x * DOT_SCALE_X + DOT_OFFSET_X;
          let y = y => y * DOT_SCALE_Y + DOT_OFFSET_Y;
          this.$.dots.setAttribute('width', width);
          this.$.dots.setAttribute('height', height);

          this.ctx.lineWidth = STROKE_WIDTH;
          this.ctx.fillStyle = '#FFFFFF';
          this.ctx.fillRect(0, 0, width, height);
          this.value.traces.forEach((trace, traceIndex) => {
            this.ctx.strokeStyle = '#999999';
            this.ctx.beginPath();
            this.ctx.moveTo(x(trace.data[0].x), y(trace.data[0].y));
            this.ctx.lineTo(x(trace.data[trace.data.length-1].x), y(trace.data[0].y));
            this.ctx.stroke();

            trace.data.forEach((d, dataIndex) => {
              this.ctx.beginPath();
              if (this.hover.y == traceIndex || this.highlightIndex == dataIndex) {
                this.ctx.strokeStyle = '#E7298A';
                this.ctx.fillStyle = '#E7298A';
              } else {
                this.ctx.fillStyle = '#FFFFFF';
                this.ctx.strokeStyle = this.strokeColors[d.s];
              }
              this.ctx.arc(x(d.x), y(d.y), DOT_RADIUS, 0, Math.PI*2);
              this.ctx.fill();
              this.ctx.stroke();
            });
          });
        },

        setCommits: function(commits) {
          this.commits = commits;
        },

        highlight: function(index, b) {
          this.highlightIndex = b ? index : -1;
          this._draw();
        },

        toValueCoords(e) {
          let rect = this.$.dots.getBoundingClientRect();
          return {
            x: Math.floor((e.clientX - rect.left - DOT_OFFSET_X + STROKE_WIDTH + DOT_RADIUS)/DOT_SCALE_X),
            y: Math.floor((e.clientY - rect.top  - DOT_OFFSET_Y + STROKE_WIDTH + DOT_RADIUS)/DOT_SCALE_Y)
          };
        },

        _onMouseMove: function(e) {
          let rect = this.toValueCoords(e);
          if (this.hover.x == rect.x && this.hover.y == rect.y) {
            return
          }
          this.hover = rect;
          if (rect.y >= 0 && rect.y < this.value.traces.length) {
            this.fire('hover', this.value.traces[rect.y].label);
          }
          this._draw();
        },

        _onMouseDown: function(e) {
          let rect = this.toValueCoords(e);
          console.log(e);
          console.log(rect);
          // Look backwards in the trace for the previous commit with data.
          var firstCommit = 0;
          var trace = this.value.traces[rect.y];
          for (var i=trace.data.length-1; i>=0; i--) {
            if (trace.data[i].x == rect.x) {
              if (i > 0) {
                firstCommit = trace.data[i-1].x+1;
                break;
              }
            }
          }

          var commitinfo = this.commits.slice(firstCommit, rect.x+1);
          commitinfo.reverse();
          this.fire('show-commits', commitinfo);
        },
      });
    })();
  </script>
</dom-module>
