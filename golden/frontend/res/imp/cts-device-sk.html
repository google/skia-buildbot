    <div class="vertical layout" hidden$="[[!_showResult]]">
      <div class="horizontal layout">
        <span>[[_deviceStatus]] - [[device.name]]([[device.id]]) - version [[device.versionID]] -  [[device.brand]]</span>
      </div>
      <div class="vertical layout">
        <template is="dom-repeat" items="[[_results]]">
          <div class="horizontal layout">
            <span>[[item._passFail]]</span>  <span>[[item.name]]</span> <span>[[item._summary]]</span>
          </div>
          <div hidden$="[[!_showDiff(item)]]">
            <digest-details-sk
              mode="diff"
              details="[[_getDetailsRec(item)]]"
              right="[[item._smallestDiff]]"
              embedded>
            </digest-details-sk>
          </div>
        </template>
      </div>
    </div>
  </template>
  <script>
    (function() {
      var USE_METRIC = gold.METRIC_COMBINED;

      Polymer({
        is: 'cts-device-sk',

        properties: {
          device: {
            type: Object,
            value: function() { return {}; },
            observer: "_deviceChanged"
          },

          _deviceStatus: {
            type:String,
            value: ""
          }
        },

        _deviceChanged: function(newDev, oldDev) {
          if (newDev.results) {
            this.set('_showResult', false);

            var passed = true;
            // Preprocess item
            // // calculate results
            for(var i=0; i < newDev.results.length; i++) {
              var r = newDev.results[i];
              var smallest = this._getSmallestDiff(r.diffs);

              var testPassed = (smallest.diffs[USE_METRIC] === 0.0);
              passed = passed && testPassed;
              r._passed = passed;
              r._passFail = this._passFailStr(testPassed);
              r._summary = 'diffvalue';
              r._smallestDiff = smallest;
            }

            this.set('_deviceStatus', this._passFailStr(passed));
            this.set('_results', newDev.results)
            this.set('_showResult', true);
          }
        },

        _passFailStr: function(pass) {
          return (pass) ? 'PASSED' : 'FAILED';
        },

        _getSmallestDiff: function(diffs) {
          if (!diffs || (diffs.length===0)) {
            return null;
          }

          var minDiff = diffs[0];
          for(var i=1; i < diffs.length; i++) {
            if (diffs[i].diffs[gold.METRIC_COMBINED] < minDiff.diffs[gold.METRIC_COMBINED]) {
              minDiff = diffs[i];
            }
          }
          return minDiff;
        },

        _showDiff: function(result) {
          return !result._passed;
        },

        _getDetailsRec: function(result) {
          return {
            test: result.name,
            digest: result.imgID,
            status: null,
            paramset: null
          };
        }
      });
    })();
  </script>
</dom-module>
