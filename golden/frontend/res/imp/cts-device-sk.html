    <div class="vertical layout" hidden$="[[!device]]">
      <div class="horizontal layout">
        <span>[[_deviceStatus]] - [[device.name]]([[device.id]]) - version [[device.versionID]] -  [[device.brand]]</span>
      </div>
      <div class="vertical layout">
        <template is="dom-repeat" items="[[device.results]]">
          <div class="horizontal layout">
            <span>[[item._passFail]]</span><span>[[item.name]]</span><span>[[item._summary]]</span>
          </div>
          <div hidden$="[[_showDiff(item)]]">
            <digest-details-sk
              mode="diff"
              details="[[_getDetailsRec(item)]]"
              right="[[_item.diff]]"
              embedded>
            </digest-details-sk>
          </div>
        </template>
      </div>
    </div>
  </template>
  <script>
    Polymer({
      is: 'cts-device-sk',

      properties: {
        device: {
          type: Object,
          value: function() { return {}; },
          observer: "_deviceChanged"
        },

        _deviceStatus: {
          type:String,
          value: ""
        },

      },

      ready: function () {
      },

      _deviceChanged: function(newDev, oldDev) {
        var passed = true;
        if (newDev.result) {
          // Preprocess item
          // // calculate results
          for(var i=0; i < newDev.result.length; i++) {
            var r = newDev.result[i];
            var testPassed = (r.diff.diffs[r.closestMetric] > 0.0);
            passed = passed && testPassed;
            r._passFail = testPassed ? 'Pass':'Fail';
            r._summary = 'diffvalue';
          }
        }
      },

      _showDiff: function(result) {

      },

      _getDetailsRec: function(result) {

      },

      _chooseDiff: function(result) {

      }
    });
