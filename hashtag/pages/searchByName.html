<!DOCTYPE html>
<html>

<head>
    <title>Hashtag</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=egde,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://apis.google.com/js/api.js" nonce='{%.Nonce%}'></script>
</head>

<body>
    <header><a href='/'>Home</a> #{%.Hashtag%}</header>
    <section>
        <h2>Drive</h2>
        <team-drive-sk query="{%.Hashtag%}"></team-drive-sk>
    </section>

    <section>
        <h2>Gerrit</h2>
        <ul>
            {%range .GerritList%}
            <li><a href='{%.URL%}'>{%.Title%}</a></li>
            {%end%}
        </ul>
    </section>

    <section>
        <h2>Monorail</h2>
        <ul>
            {%range .MonorailList%}
            <li><a href='{%.URL%}'>{%.Title%}</a></li>
            {%end%}
        </ul>
    </section>

    <error-toast-sk></error-toast-sk>
</body>

</html>
