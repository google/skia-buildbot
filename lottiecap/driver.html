<!DOCTYPE html>
<html>
<head>
    <title></title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=egde,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="node_modules/lottie-web/build/player/lottie.min.js" type="text/javascript" charset="utf-8"></script>
    <style type="text/css" media="screen">
      body,
      main,
      .anim {
        margin: 0;
        padding: 0;
      }

      main {
        display: flex;
        width: 1000px;
        height: 1000px;
        flex-flow: row wrap;
      }
    </style>
</head>
<body>
  <main>
    <div class=anim></div>
  </main>
  <script type="text/javascript" charset="utf-8">
    (function () {
      const TILE_COUNT = 5; // Number of tiles in x or y direction.
      const TARGET_SIZE = 1000; // Image size in pixels both x and y direction.
      const PATH = 'hamburger.json';

      let anim = lottie.loadAnimation({
        container: document.querySelector('.anim'), // the dom element that will contain the animation
        renderer: 'svg',
        loop: false,
        autoplay: true,
        path: PATH,
        rendererSettings: {
          preserveAspectRatio:'xMidYMid meet'
        },
      });


      anim.addEventListener('data_ready', e => {
        console.log(anim.frameRate, anim.totalFrames, anim.animationData.h,  anim.animationData.w);
        let width = anim.animationData.w;
        let height = anim.animationData.h;
        let scale = TARGET_SIZE / (TILE_COUNT * Math.max(width, height));
        let tileWidth = Math.ceil(scale * width);
        let tileHeight = Math.ceil(scale * height);

        let inPoint = anim.animationData.ip || 0;
        let outPoint = anim.animationData.op || anim.animationData.totalFrames - 1;
        let frameStep = (outPoint - inPoint) / (TILE_COUNT * TILE_COUNT - 1);

        let main = document.querySelector('main');
        // Clear out the first div now that our measurements are done.
        main.firstElementChild.remove();

        // Add in the 25 (5x5) tiled divs.
        for (var i = 0; i < (TILE_COUNT*TILE_COUNT) ; i++) {
          let div = document.createElement('div');
          div.classList.add('anim');
          div.style.width = tileWidth + 'px';
          div.style.height = tileHeight + 'px';
          main.appendChild(div);

          let anim = lottie.loadAnimation({
            container: div, // the dom element that will contain the animation
            renderer: 'svg',
            loop: false,
            autoplay: true,
            path: PATH,
            rendererSettings: {
              preserveAspectRatio:'xMidYMid meet'
            },
          });
          let frameStop = i * frameStep;
          anim.addEventListener('enterFrame', (e) => {
            if (Math.round(anim.currentFrame) >= frameStop) {
              anim.pause();
            }
          });
        }
      });

      anim.addEventListener('enterFrame', e => {
        console.log(e.currentTime, e.totalTime, anim.currentFrame);
      });
    })();
  </script>
</body>
</html>
