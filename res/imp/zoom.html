<!-- The <zoom-sk> custom element declaration.

  The zoom-sk element presents a zoomed in view of a source img element.

  Attributes:
    source - The id of an img element to present a zoom for.

    x, y - The point to center the zoom on. The units are in the natural size
      of the source image.

    pixels - The number of pixels to display in the horizontal direction.

  Events:
    zoom-point - This event is generated whenever the zoom moves. The detail
      of the event contains the values for the color:

          {
            x: 100,
            y: 100,
            r: 0xff,
            g: 0xef,
            b: 0xd5,
            a: 0xff,
            rgb: "rbg(255, 239, 213, 1.0)",
            hex: "#ffefd5ff",
          }

    zoom-loaded - This event is generated whenever the zoom has finished
        updating the zoomed view after an image load.

  Methods:

    drawZoom() - to be called if the source img/canvas in the zoomed region has changed,
                 or the x,y location has changed.

    getPixelColor(x,y) - Returns the color of the pixel as an array in RGBA format.

-->

<link rel="import" href="/res/imp/bower_components/iron-resizable-behavior/iron-resizable-behavior.html">
<dom-module id="zoom-sk">
  <style type="text/css" media="screen">
    #zoom {
      margin: 0;
      padding: 0;
    }

    :host {
      padding: 0;
    }

  </style>
  <template>
    <canvas id=zoom width=10 height=10></canvas>
  </template>
  <script>
    Polymer({
      is: 'zoom-sk',

      behaviors: [
        // Listen for resize events and change the size of the #zoom canvas accordingly.
        Polymer.IronResizableBehavior
      ],

      listeners: {
        'iron-resize': '_onIronResize'
      },

      attached: function() {
        this.async(this.notifyResize, 1);
      },

      properties: {
        source: {
          type: String,
          value: "",
        },
        x: {
          type: Number,
          value: 0,
          reflectToAttribute: true,
          observer: "drawZoom",
        },
        y: {
          type: Number,
          value: 0,
          reflectToAttribute: true,
          observer: "drawZoom",
        },
        pixels: {
          type: Number,
          value: 10,
          reflectToAttribute: true,
          observer: "_pixelResize",
        },
        allow_draw: {
          type: Boolean,
          value: false,
        }
      },

      ready: function () {
        // Grab the thing we are zooming from.
        this._source = $$$('#' + this.source, this._findParent());

        // The canvas context we are drawing the zoomed pixels on.
        this.ctx = this.$.zoom.getContext('2d');
        if (this._source.width == 0 || this._source.height == 0) {
          return;
        }
      },

      changeActiveSource(element) {
        this._source = element;
      },

      // Why is this part of the zoom element?
      // getPixelColor: function(x,y) {
      //   return this._source.getContext('2d').getImageData(x, y, 1, 1).data;
      // },

      _findParent: function() {
        var p = this.parentNode;
        while (p.parentNode != null) {
          p = p.parentNode;
        }
        return p
      },

      _onIronResize: function() {
         this.pixelSize = 13;
         w = this.pixels * this.pixelSize + 1;
         this.$.zoom.width = w;
         this.$.zoom.height = w;
         this.$.zoom.parentElement.width = w;
         this.$.zoom.parentElement.height = w;
         this.drawZoom();
      },

      drawZoom: function () {
        if (!this.allow_draw) { return; }
        if (!this.ctx) { return; }

        this.ctx.clearRect(0, 0, this.ctx.canvas.width, this.ctx.canvas.height);
        var dx = this.pixelSize;
        var dy = this.pixelSize;
        this.ctx.lineWidth =  1;
        this.ctx.strokeStyle = '#000';
        // Draw out each pixel as a rect on the target canvas, as this works around FireFox doing a blur as it copies from one canvas to another.

        s = this.pixels;
        hs = Math.floor(s / 2);
        var colors;
        var flip = false; // pixel buffer from webgl is upside down
        if (sourceCtx = this._source.getContext('2d')) {
          colors = sourceCtx.getImageData(this.x-hs, this.y-hs, s, s).data;
        } else if ((sourceCtx = this._source.getContext('webgl2')) || (sourceCtx = this._source.getContext('webgl'))) {
          colors = new Uint8Array(s*s*4);
          sourceCtx.readPixels(this.x-s/2, (sourceCtx.drawingBufferHeight-this.y)-s/2, s, s,
            sourceCtx.RGBA, sourceCtx.UNSIGNED_BYTE, colors);
          flip = true;
        }
        for (var x = 0; x < s; x++) {
          for (var y = 0; y < s; y++) {
            var offset = (y * s + x) * 4;
            if (flip) { var offset = ((s-1-y) * s + x) * 4; }
            // Offset into the colors array.
            var colorRGB = sk.colorRGB(colors, offset, true);
            var colorRGBStyle = sk.colorRGB(colors, offset, false);
            this.set("ctx.fillStyle", colorRGBStyle);
            this.ctx.fillRect(x * dx + 1, y * dy + 1, dx - 1, dy - 1);
            // Box one selected pixel with its rgba values.
            if (x == hs && y == hs) {
              this.ctx.strokeRect(x * dx + 0.5, y * dy + 0.5, dx, dy);
              var detail = {
                x: this.x,
                y: this.y,
                r: colors[offset+0],
                g: colors[offset+1],
                b: colors[offset+2],
                a: colors[offset+3],
                rgb: colorRGB,
                hex: sk.colorHex(colors, offset),
              };
              var evt = new CustomEvent('zoom-point', {
                detail: detail,
                bubbles: true
              });
              this.dispatchEvent(evt);
            }
          }
        }
      },

    });
  </script>
</dom-module>
