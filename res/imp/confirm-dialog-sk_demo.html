<html>
<head>
  <title>confirm-dialog-sk demo</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1, user-scalable=yes">
  <script src="/res/common/js/common.js"></script>
  <script src="/res/imp/bower_components/webcomponentsjs/webcomponents-lite.js"></script>
  <link rel="import" href="confirm-dialog-sk.html">

  <script>
    function openDialog() {
    $$$('confirm-dialog-sk').open('Proceed with taking over the world?').then(function() {
        var start = new Date().getTime();
    while (new Date().getTime() < start + 1000);
    var node = document.createElement('div');
    var textnode = document.createTextNode('Brain');
    node.appendChild(textnode);
        $$$('#output').appendChild(node);
      }, function() {
        var start = new Date().getTime();
    while (new Date().getTime() < start + 1000);
    var node = document.createElement('div');
    var textnode = document.createTextNode('Pinky');
    node.appendChild(textnode);
        $$$('#output').appendChild(node);
      });
    }
  </script>
</head>
<body>
  <confirm-dialog-sk id="confirm_dialog"></confirm-dialog-sk>

  <paper-button raised onClick="openDialog();">Open Dialog</paper-button>
  <div id="output"></div>
</body>
</html>
