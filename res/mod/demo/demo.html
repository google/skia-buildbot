<!DOCTYPE html>
<html>
<head>
    <title>login-sk demo</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=egde,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style type="text/css" media="screen">
      .loginsk {
        background: #1F78B4;
        padding: 1em;
        display: flex;
        flex-flow: row;
        justify-content: flex-end;
      }
    </style>
</head>
<body>
  <tabs-sk>
    <button class=selected>login-sk</button>
    <button>error-toast-sk</button>
    <button>new-element</button>
  </tabs-sk>
  <tabs-panel-sk>
    <div>
      <h1>login-sk demo</h1>
      <div class='loginsk' >
        <login-sk></login-sk>
      </div>
    </div>

    <div>
      <h1>error-toast-sk</h1>
      <button id=test_error_toast>trigger</button>
      <script type="text/javascript" charset="utf-8">
        document.getElementById('test_error_toast').addEventListener('click', e  => Demo.errorMessage('Testing'));
      </script>
    </div>

    <div>
      Put a new element demo here.
    </div>
  </tabs-panel-sk>
  <error-toast-sk></error-toast-sk>
</body>
</html>
