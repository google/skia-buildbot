apiVersion: apps/v1beta1
kind: Deployment
metadata:
  name: alertmanager
spec:
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.14.0
        args:
          - "--web.listen-address=:9090"
          - "--config.file=/etc/alertmanager/alertmanager-config.yml"
          - "--storage.path=/alertmanager"
        volumeMounts:
        - name: alertmanager-volume
          mountPath: /etc/alertmanager
        - name: alertmanager
          mountPath: /alertmanager
        resources:
          requests:
            memory: "30Mi"
            cpu: "100m"
      - name: configmap-reload
        args:
          - "--volume-dir=/etc/alertmanager/"
          - "--webhook-method=POST"
          - "--webhook-url=http://localhost:9090/-/reload"
        image: gcr.io/skia-public/configmap-reload:2018-04-27T17_36_11Z-jcgregorio-0a104d82b21f0c2b40bf5182890c5eab412c8a1b-dirty
        volumeMounts:
        - name: alertmanager-volume
          mountPath: /etc/alertmanager
        resources:
          requests:
            memory: "30Mi"
            cpu: "20m"
      - name: iap-proxy
        args:
          - "--logtostderr"
          - "--aud=/projects/145247227042/global/backendServices/4493246894391105705"
          - "--port=:8080"
          - "--target_port=:9090"
        image: gcr.io/skia-public/iap_proxy:2018-04-27T17_38_38Z-jcgregorio-8fd51e30cdd9748f7446ec34bb1bdfcbeb7af9ba-dirty
        ports:
          - name: http
            containerPort: 8080
        volumeMounts:
          - name: skia-public-auth
            mountPath: /var/secrets/skia-public-auth
        resources:
          requests:
            memory: "30Mi"
            cpu: "200m"
      volumes:
        - name: alertmanager-volume
          configMap:
            name: alertmanager-conf
        - name: skia-public-auth
          secret:
            secretName: skia-public-auth
        - name: alertmanager
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: alertmanager
  name: alertmanager
spec:
  ports:
    - name: http
      protocol: TCP
      port: 8080
  selector:
    app: alertmanager
  type: NodePort

