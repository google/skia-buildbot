<!--
  This in an HTML Import-able file that contains the definition
  of the following elements:

    <gold-status-sk>

  This element occasionally polls the autoroller, displaying the number of gms that need triaging.

  To use this file import it:

    <link href="/res/imp/gold-status-sk.html" rel="import" />

  Usage:

    <gold-status-sk></gold-status-sk>

  Properties:
    reload: How often (in seconds) to reload the gold status.
-->

<link rel="import" href="/res/imp/bower_components/iron-ajax/iron-ajax.html">
<link rel="import" href="/res/imp/bower_components/iron-icons/iron-icons.html">
<link rel="import" href="/res/imp/bower_components/iron-icons/image-icons.html">
<link rel="import" href="/res/imp/bower_components/paper-button/paper-button.html">

<link rel="import" href="/res/common/imp/timer-sk.html">

<dom-module id="gold-status-sk">
  <template>
    <style>
      a {
        color: var(--status-sk-text-color);
        text-decoration: none;
        text-transform: none;
      }
      a.corpus:hover {
        text-decoration: underline;
      }
      .label {
        padding: 5px;
      }
      .value {
        background-color: var(--status-sk-icon-color);
        border-radius: 3px;
        padding: 5px;
      }
      iron-icon {
        color: var(--status-sk-icon-color);
      }
    </style>

    <iron-ajax
      id="status"
      auto url="[[_goldUrl]]/json/trstatus"
      handle-as="json"
      timeout="30000"
      last-response="{{_goldStatus}}"
      on-response="_handleResponse">
    </iron-ajax>

    <timer-sk period="[[reload]]" on-trigger="_reload">

    <a href$="_goldUrl" target="_blank">
      <paper-button><iron-icon icon="image:collections"></iron-icon></paper-button>
    </a>

    <template is="dom-repeat" items="{{_objToArr(_goldStatus)}}" as="c">
      <a class="corpus" href$="{{_getLink(c)}}" target="_blank">
        <span class="label">{{c.name}}</span>
        <span class="value">{{c.untriagedCount}}</span>
      </a>
    </template>
  </template>
  <script>
  Polymer({
    is:"gold-status-sk",

    properties: {
      // input
      reload: {
        type: Number,
        value: 10,
      },

      // private
      _goldStatus: {
        type: Object,
      },

      _goldUrl: {
        type: String,
        value: "https://gold.skia.org"
      }
    },

    _reload: function(){
      // debugger;
      // sk.get(this._goldUrl+"/json/trstatus").then(JSON.parse).then(function (json) {
      //   debugger;
      //   this.set('_goldStatus', json);
      // }.bind(this)).catch(function(errorMessage) {
      //   debugger;
      //   console.log("Status Error:", errorMessage);
      // }.bind(this));

      // this.$.status.generateRequest();
    },

    _handleResponse: function(ev) {
      // debugger;
      // this.set('_goldStatus', ev.detail.response);
    },

    _getLink: function(corpus) {
      if (corpus.label === "gm") {
        return "https://gold.skia.org/";
      }
      return "https://gold.skia.org/list?query=source_type%3D" + corpus.label;
    },

    _objToArr: function(obj) {
      debugger;
      return (obj && obj.corpStatus) ? obj.corpStatus : [];
      var arr = [];
      for (c in obj) {
        arr.push({"label":c, "value":obj[c]});
      }
      return arr;
    },

  });
  </script>
</dom-module>
