<!--
  This in an HTML Import-able file that contains the definition
  of the following elements:

    <capacity-stats-sk>

  This is a top level element.

  Properties:
    None.

  Methods:
    None.

  Events:
    None.
-->

<link rel="import" href="/res/imp/bower_components/iron-flex-layout/iron-flex-layout-classes.html">
<link rel="import" href="/res/imp/bower_components/paper-input/paper-input.html">
<link rel="import" href="/res/imp/bower_components/paper-spinner/paper-spinner.html">

<link rel="import" href="/res/common/imp/app-sk.html">
<link rel="import" href="/res/common/imp/url-params-sk.html">


<link rel="import" href="status-menu-section-sk.html">

<dom-module id="capacity-stats-sk">
  <template>
    <style include="iron-flex iron-flex-alignment iron-positioning">
      :host{
        --app-sk-main: {
          background-color: transparent;
          font-family: sans-serif;
        };

        login-sk{
          --login-sk-color: white;
        };
      }
      app-sk {
        --app-sk-toolbar: {
          color: #FFFFFF;
          font-size: 15px;
          font-family: sans-serif;
          text-align: center;

          background-color: #66A61E;
        };
      }

      table {
        border-collapse: collapse;
        margin: 5px;
      }
      td, th {
        border: 1px solid #DDD;
        padding: 5px;
      }
      th {
        position: relative;
      }

      a {
        color: black;
      }

      .inputs {
        min-height: 60px;
      }

      .inputs > * {
        margin: 5px;
      }

      .notEnough {
        background: #f4c7c3;
      }

      .beatsOptimistic {
        background: #fce8b2;
      }

      .beatsPessimistic {
        background: #b7e1cd;
      }

    </style>

    <app-sk id="app" class="fit"
        mode="waterfall"
        tall_class="tall"
        responsive_width="800px"
        logged_in_email="{{email}}"
        narrow="{{narrow}}">
      <status-menu-section-sk navigation></status-menu-section-sk>

      <h1 header>Capacity Statistics for Skia Bots</h1>

      <div class="inputs horizontal layout">
        <paper-input label="Commits Per Day" value="{{commits_per_day}}"></paper-input>
        <paper-input label="Optimistic Utilization Estimate" value="{{optimistic_util}}"></paper-input>
        <paper-input label="Pessimistic Utilization Estimate" value="{{pessimistic_util}}"></paper-input>
      </div>

      <table>
        <thead>
          <tr>
            <th>Bot Config</th>
            <th>Minutes per Commit </th>
            <th>Tasks per Commit</th>
            <th>Bot days of work / actual day</th>
            <th>Optimistic Bot Estimate</th>
            <th>Pessimistic Bot Estimate</th>
            <th>Actual Bot Count</th>
            <th>Percent of Optimistic Estimate</th>
          </tr>
        </thead>
        <tbody>
          <template id="list" is="dom-repeat" items="[[stats]]" as="item" sort="_sort">
            <tr>
              <td><a href$="[[_taskLink(item)]]">[[_botConfig(item)]]</a></td>
              <td>[[_minutes(item.ms_per_commit)]]</td>
              <td>[[_numTasks(item)]]</td>
              <td>[[_botDays(item, commits_per_day)]]</td>
              <td>[[_estimate(item, commits_per_day, optimistic_util)]]</td>
              <td>[[_estimate(item, commits_per_day, pessimistic_util)]]</td>
              <td class$="[[_class(item, commits_per_day, optimistic_util, pessimistic_util)]]">
                [[_numBots(item)]]
              </td>
              <td class$="[[_class(item, commits_per_day, optimistic_util, pessimistic_util)]]">
                [[_weHave(item, commits_per_day, optimistic_util)]] %
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </app-sk>

  </template>
  <script>
  (function(){
    var ANDROID_ALIASES = {
      "angler": "Nexus 6p",
      "bullhead": "Nexus 5X",
      "dragon": "Pixel C",
      "flo": "Nexus 7 (2013)",
      "flounder": "Nexus 9",
      "foster": "NVIDIA Shield",
      "fugu": "Nexus Player",
      "gce_x86": "Android on GCE",
      "grouper": "Nexus 7 (2012)",
      "hammerhead": "Nexus 5",
      "heroqlteatt": "Galaxy S7",
      "m0": "Galaxy S3",
      "mako": "Nexus 4",
      "manta": "Nexus 10",
      "marlin": "Pixel XL",
      "sailfish": "Pixel",
      "shamu": "Nexus 6",
      "sprout": "Android One",
    };

    var GPU_ALIASES = {
      "1002":      "AMD",
      "1002:6613": "AMD Radeon R7 240",
      "1002:6779": "AMD Radeon HD 6450/7450/8450",
      "1002:6821": "AMD Radeon HD 8870M",
      "1002:683d": "AMD Radeon HD 7770/8760",
      "1002:9830": "AMD Radeon HD 8400",
      "1002:9874": "AMD Carrizo",
      "102b":      "Matrox",
      "102b:0522": "Matrox MGA G200e",
      "102b:0532": "Matrox MGA G200eW",
      "102b:0534": "Matrox G200eR2",
      "10de":      "NVIDIA",
      "10de:08a4": "NVIDIA GeForce 320M",
      "10de:08aa": "NVIDIA GeForce 320M",
      "10de:0fe9": "NVIDIA GeForce GT 750M Mac Edition",
      "10de:0ffa": "NVIDIA Quadro K600",
      "10de:104a": "NVIDIA GeForce GT 610",
      "10de:11c0": "NVIDIA GeForce GTX 660",
      "10de:1244": "NVIDIA GeForce GTX 550 Ti",
      "10de:1401": "NVIDIA GeForce GTX 960",
      "8086":      "Intel",
      "8086:0046": "Intel Ironlake HD Graphics",
      "8086:0166": "Intel Ivy Bridge HD Graphics 4000",
      "8086:0412": "Intel Haswell HD Graphics 4600",
      "8086:041a": "Intel Haswell HD Graphics",
      "8086:0a2e": "Intel Haswell Iris Graphics 5100",
      "8086:0d26": "Intel Haswell Iris Pro Graphics 5200",
      "8086:1616": "Intel Broadwell HD Graphics 5500",
      "8086:161e": "Intel Broadwell HD Graphics 5300",
      "8086:1626": "Intel Broadwell HD Graphics 6000",
      "8086:162b": "Intel Broadwell Iris Graphics 6100",
      "8086:1912": "Intel Skylake HD Graphics 530",
      "8086:22b1": "Intel Braswell HD Graphics",
    };

    Polymer({
      is: 'capacity-stats-sk',
      properties: {
        commits_per_day: {
          type: Number,
          value: 30,
        },
        optimistic_util: {
          type: Number,
          value: 0.85,
        },
        pessimistic_util: {
          type: Number,
          value: 0.60,
        },
        stats: {
          type: Array
        }
      },

      observers: ["_resort(commits_per_day,optimistic_util,pessimistic_util)"],

      ready: function() {
        sk.get("/capacity/json").then(JSON.parse).then(function(map){
          var arr = [];
          map = map || {};
          for (k in map) {
            var item = map[k];
            if (!item) {
              continue;
            }
            // preprocess dimensions
            item.dimensions = item.dimensions || [];
            for (var i = 0; i < item.dimensions.length; i++) {
              var d = item.dimensions[i];
              var split = d.split(":", 1);
              var dim = split[0];
              var val = d.substring(dim.length + 1);
              item[dim] = val;
            }
            // preprocess total time per commit from nanoseconds to millis.
            item.ms_per_commit = 0;
            item.task_times_ns = item.tasks || [];
            for (var i = 0;i < item.tasks.length; i++) {
              item.ms_per_commit += item.tasks[i].task_duration_ns/1000000;
            }

            arr.push(item);
          }
          this.set("stats", arr);
        }.bind(this));
      },

      _alias: function(str, lookup) {
        var alias = lookup[str];
        if (alias) {
          return `${alias} (${str})`;
        }
        return str;
      },

      _botConfig: function(item) {
        var os = "(unspecified)";
        if (item.os) {
          os = item.os;
        }
        var pool = "(unspecified)";
        if (item.pool) {
          pool = item.pool;
        }

        var rest = "";
        if (item.device) {
          rest = `Device: ${item.device}`;
        }
        if (item.device_type) {
          var alias = this._alias(item.device_type, ANDROID_ALIASES);
          rest = `Device Type: ${alias}`;
        }
        if (item.gpu) {
          var alias = this._alias(item.gpu, GPU_ALIASES);
          rest = `GPU: ${alias}`;
        }
        if (item.cpu) {
          rest += `, CPU: ${item.cpu}`;
        }


        if (pool !== "Skia") {
          return `OS: ${os}, Pool: ${pool}, ${rest}`;
        }
        return `OS: ${os}, ${rest}`;
      },

      _botDays: function(item, commits_per_day) {
        var days = (item.ms_per_commit * commits_per_day) / (24 * 60 * 60 * 1000)
        return days.toFixed(1);
      },

      _class: function(item, commits_per_day, optimistic_util, pessimistic_util) {
        var pessimistic = this._estimate(item, commits_per_day, pessimistic_util);
        var optimistic = this._estimate(item, commits_per_day, optimistic_util);
        if (this._numBots(item) < optimistic) {
          return "notEnough";
        }
        if (this._numBots(item) > pessimistic) {
          return "beatsPessimistic";
        }
        return "beatsOptimistic";
      },

      _estimate: function(item, commits_per_day, util) {
        var days = (item.ms_per_commit * commits_per_day) / (24 * 60 * 60 * 1000)
        return (days / util).toFixed(1);
      },

      _minutes: function(ms) {
        // convert from ms to minutes
        return (ms/(60 * 1000)).toFixed(1);
      },

      _numBots: function(item) {
        return Object.keys(item.bots).length;
      },

      _numTasks: function(item) {
        return item.task_times_ns.length;
      },

      _resort: function() {
        this.$.list.render();
      },

      _sort: function(a, b) {
        var aVal = this._weHave(a, this.commits_per_day, this.optimistic_util);
        var bVal = this._weHave(b, this.commits_per_day, this.optimistic_util);
        return bVal - aVal;
      },

      _taskLink: function(item) {
        var base = "https://chromium-swarm.appspot.com/tasklist?c=name&c=state&c=created_ts&c=user&c=gpu&c=device_type&c=os&l=50&s=created_ts%3Adesc";
        for (var i = 0;i<item.dimensions.length;i++) {
          base += "&f=" + item.dimensions[i];
        }
        return base;
      },

      _weHave: function(item, commits_per_day, util) {
        var est = this._estimate(item, commits_per_day, util);
        return (100 * this._numBots(item) / est).toFixed(1);
      }
    });
  })();
  </script>
</dom-module>
