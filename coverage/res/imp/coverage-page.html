<link rel="import" href="/res/imp/bower_components/iron-flex-layout/iron-flex-layout-classes.html">
<link rel="import" href="/res/imp/bower_components/iron-icon/iron-icon.html">
<link rel="import" href="/res/imp/bower_components/iron-icons/iron-icons.html">
<link rel="import" href="/res/imp/bower_components/paper-button/paper-button.html">
<link rel="import" href="/res/imp/bower_components/paper-checkbox/paper-checkbox.html">
<link rel="import" href="/res/imp/bower_components/paper-input/paper-input.html">
<link rel="import" href="/res/common/imp/url-params-sk.html">

<link rel="import" href="/res/common/imp/app-sk.html" />

<link rel="import" href="coverage-menu.html" />

<dom-module id="coverage-page">
  <template>
    <style is="custom-style" include="iron-positioning">
        app-sk {
        --app-sk-main: {
          background-color: #FFFFFF;
          font-family: sans-serif;
          padding: 5px;
          position: relative;
        };

        --app-sk-toolbar: {
          background-color: #6b367d;
          font-family: sans-serif;
        };

        login-sk{
          --login-sk-color: white;
        };
      }
      .innerframe {
        width: 80vw;
        height: 95vh;
      }

    </style>

    <url-param-sk name="commit" value="{{_commit}}"></url-param-sk>
    <url-param-sk name="job" value="{{_job}}"></url-param-sk>

    <app-sk class="fit" drawer_width="250px">
      <div header class="header">Power Controller</div>
      <coverage-menu navigation></coverage-menu>
      <iframe class="innerframe" src$="/cov_html/[[_commit]]/[[_job]]/html/index.html"></iframe>

    </app-sk>

  </template>
  <script>
    Polymer({
      is: "coverage-page",

      properties: {
        _commit: {
          type: String,
        },
        _job: {
          type: String,
        },
      },

    });
  </script>
</dom-module>
