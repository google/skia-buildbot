<!-- The <diff-details-sk> custom element delcaration.

  Displays the details about a diff.
-->

<link rel="import" href="bower_components/iron-flex-layout/iron-flex-layout-classes.html">
<link rel="import" href="bower_components/paper-button/paper-button.html">

<link rel="import" href="../common/imp/paramset.html">
<link rel="import" href="../common/imp/triage-sk.html">

<link rel="import" href="shared-styles.html">

<dom-module id="diff-details-sk">
  <template>
    <style is="custom-style" include="iron-flex iron-flex-alignment"></style>
    <style include="shared-styles"></style>
    <style>
      .hidden * {
        display: none;
      }

      .preview {
        margin: 5px;
        border: solid 2px lightgray;
        display: block;
        width: 132px;
        height: 132px;
      }

      .preview img {
        display: block;
        max-width: 128px;
        max-height: 128px;
        width: auto;
        height: auto;
      }
    </style>
  <div class="horizontal layout wrap">
    <div class="preview">
      <img src$="{{_imageHref(images.left)}}">
    </div>
    <div class="preview">
      <img src$="{{_imageHref(images.right)}}">
    </div>
    <div class="preview">
      <img src$="{{_diffImageHref(images.left, images.right)}}">
    </div>
    </div>
  </div>
  </template>
  <script>
    Polymer({
      is: 'diff-details-sk',

      properties: {
        details: {
          type: Object,
          value: function() { return {}; },
        }
      },

      ready: function() {},

      _noData: function(details) {
        return !(details && details.images);
      },

      _imageHref: function(image) {
        return "http://127.0.0.1:9001" + gold.imgHref(image);
      },

      _diffImageHref: function(left, right) {
        return "http://127.0.0.1:9001" + gold.diffImgHref(left, right);
      }


    })
  </script>
</dom-module>
