<!--
  The <diff-details-sk> custom element delcaration.

  Displays the details about a diff.
-->

<link rel="import" href="bower_components/iron-flex-layout/iron-flex-layout-classes.html">
<link rel="import" href="bower_components/iron-icon/iron-icon.html">

<link rel="import" href="shared-styles.html">

<dom-module id="diff-details-sk">
  <template>
    <style is="custom-style" include="iron-flex iron-flex-alignment"></style>
    <style include="shared-styles"></style>
    <style>
      .preview {
        margin: 5px;
        border: solid 2px lightgray;
        display: block;
        width: 400px;
        height: 287px;
      }

      .preview img {
        display: block;
        max-width: 400px;
        max-height: 287px;
        width: auto;
        height: auto;
      }

      .imgtext {
        padding-left: 0.5em;
        font-weight: bold;
      }

      table {
        table-layout: fixed;
      }

      tr:nth-child(even) {
        background-color: #f2f2f2;
      }

      th {
        background-color: #7a7a7a;
        color: white;
      }

      td {
        width: 50%;
      }
    </style>
  <div class="horizontal layout wrap">
    <table border="0" cellspacing="5" cellpadding="5">
      <tr><th>Website Information</th><th></th></tr>
      <tr><td>URL</td><td><a target="_blank" href$="https://{{url}}">{{url}}</a></td></tr>
      <tr><td>Popularity Rank</td><td>{{rank}}</td></tr>
    </table>
    <div class="vertical layout wrap">
      <div class="horizontal layout wrap">
        <div class="imgtext">Without Patch Image</div>
        <a target="_blank" rel="noopener" href$="{{_imageHref(images.left)}}"><iron-icon icon="open-in-new"></iron-icon></a>
      </div>
      <div class="preview">
        <img src$="{{_imageHref(images.left)}}">
      </div>
    </div>
    <div class="vertical layout wrap">
      <div class="horizontal layout wrap">
        <div class="imgtext">With Patch Image</div>
        <a target="_blank" rel="noopener" href$="{{_imageHref(images.right)}}"><iron-icon icon="open-in-new"></iron-icon></a>
      </div>
      <div class="preview">
        <img src$="{{_imageHref(images.right)}}">
      </div>
    </div>
    <div class="vertical layout wrap">
      <div class="horizontal layout wrap">
        <div class="imgtext">Diff Image</div>
        <a target="_blank" rel="noopener" href$="{{_diffImageHref(images.left, images.right)}}"><iron-icon icon="open-in-new"></iron-icon></a>
      </div>
      <div class="preview">
        <img src$="{{_diffImageHref(images.left, images.right)}}">
      </div>
    </div>
    <table border="0" cellspacing="5" cellpadding="5">
      <tr><th>Diff Metric</th><th>Value</th></tr>
      <tr><td>Number of Different Pixels</td><td>{{diffmetrics.numDiffPixels}}</td></tr>
      <tr><td>Percentage of Different Pixels</td><td>{{diffmetrics.pixelDiffPercent}}</td></tr>
      <tr><td>Max Red Difference</td><td>{{diffmetrics.maxRGBADiffs.0}}</td></tr>
      <tr><td>Max Green Difference</td><td>{{diffmetrics.maxRGBADiffs.1}}</td></tr>
      <tr><td>Max Blue Difference</td><td>{{diffmetrics.maxRGBADiffs.2}}</td></tr>
    </table>
  </div>

  </template>
  <script>
    Polymer({
      is: 'diff-details-sk',

      _imageHref: function(image) {
        return '/img/images/' + image + '.png'
      },

      _diffImageHref: function(left, right) {
        var leftPath = left.split("/");
        var rightPath = right.split("/");
        if (leftPath[0] == rightPath[0] && leftPath[2] == rightPath[2]) {
          return '/img/diffs/' + leftPath[0] + '/' + leftPath[2] + '.png'
        }
        return '';
      }

    })
  </script>
</dom-module>
