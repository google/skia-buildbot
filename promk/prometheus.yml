global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  - job_name: 'iap-proxy'
    static_configs:
      - targets: ['localhost:10000']
  - job_name: 'docserverk'
    static_configs:
      - targets: ['docserverk:20000']

