<!--
  The <expanding-textarea-sk> custom element declaration. Allows entering a
  string of comma separated items. Eg: "item1,item2,item3,item4".

  Attributes:
    items: Contains the items entered into the textarea.
    displayText: The clickable text that will open/close the textarea.

  Events:
    None.

  Methods:
    None.
-->

<dom-module id="expanding-textarea-sk">
  <style>
    paper-input {
      width: 20em;
    }

    .long-field {
      width: 40em;
    }
  </style>
  <template>
    <a href="javascript:void(0);" id="items_expander">
      <iron-icon icon="{{expanderIcon(opened)}}"></iron-icon>
      {{displayText}}
    </a>
    <span class="long-field">
      <iron-collapse id="items_collapse" opened="{{opened}}">
        <iron-autogrow-textarea class="long-field" rows=5 max-rows=20 bind-value="{{items}}" placeholder="Eg: item1,item2,item3,item4">
        </iron-autogrow-textarea>
      </iron-collapse>
    </span>
  </template>
  <script>
    Polymer({
      is: "expanding-textarea-sk",
      properties: {
        opened: {
          type: Boolean,
          value: false,
        },
        items: {
          type: String,
          notify: true,
        },
        displayText: {
          type: String,
          value: "Specify custom list of items",
        },
      },

      ready: function() {
        var that = this;
        this.$.items_expander.addEventListener('click', function(e) {
          that.$.items_collapse.toggle();
        });
      },

      expanderIcon: function(opened) {
        if (opened) {
          return "expand-less";
        } else {
          return "expand-more";
        }
      },
    });
  </script>

</dom-module>
