<!DOCTYPE html>
<html>
  <head>
    <title>{{.ChildName}} into {{.ParentName}} AutoRoller</title>
  </head>
  <body>
    <style>
    app-sk {
      --app-sk-main: {
        background-color: #FFFFFF;
        font-family: sans-serif;
      };
      --app-sk-toolbar: {
        background-color: #1F78B4;
        color: #FFFFFF;
        font-size: 15px;
        font-family: sans-serif;
        text-align: center;
      };
    }
    .fit {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
    }

    <app-sk id="app" class="fit">
      <header>
        <h1>{{.ChildName}} into {{.ParentName}} AutoRoller</h1>
        <login-sk ?testing_offline=${ele.testingOffline}></login-sk>
      </header>
      <aside>
        <nav>
          <a href="/" tab-index=0>
            <home-icon-sk></home-icon-sk><span>Home</span>
          </a>
        </nav>
      </aside>
      <arb-status-sk></arb-status-sk>
    </app-sk>
  </body>
</html>
