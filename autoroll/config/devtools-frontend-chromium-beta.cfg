# See https://skia.googlesource.com/buildbot.git/+show/master/autoroll/go/roller/config.go#130
# for documentation of the autoroller config.
roller_name:  "devtools-frontend-chromium-beta"
child_display_name:  "DevTools Frontend"
parent_display_name:  "Chromium Beta Branch"
parent_waterfall:  "https://build.chromium.org"
owner_primary:  "borenet"
owner_secondary:  "rmistry"
contacts:  "devtools-waterfall-sheriff-onduty@grotations.appspotmail.com"
service_account:  "chromium-release-autoroll@skia-public.iam.gserviceaccount.com"
reviewer:  "devtools-waterfall-sheriff-onduty@grotations.appspotmail.com"
commit_msg:  {
  bug_project:  "chromium"
  child_log_url_tmpl:  "https://chromium.googlesource.com/devtools/devtools-frontend.git/+log/{{.RollingFrom}}..{{.RollingTo}}"
  include_revision_count:  true
  include_tbr_line:  true
  include_tests:  true
  built_in:  DEFAULT
}
gerrit:  {
  url:  "https://chromium-review.googlesource.com"
  project:  "chromium/src"
  config:  CHROMIUM
}
kubernetes:  {
  cpu:  "1"
  memory:  "2Gi"
  readiness_failure_threshold:  10
  readiness_initial_delay_seconds:  30
  readiness_period_seconds:  30
}
parent_child_repo_manager:  {
  gitiles_parent:  {
    gitiles:  {
      branch:  "refs/branch-heads/{{.Branches.Chromium.Beta.Number}}"
      repo_url:  "https://chromium.googlesource.com/chromium/src.git"
    }
    dep:  {
      primary:  {
        id:  "https://chromium.googlesource.com/devtools/devtools-frontend.git"
        path:  "DEPS"
      }
    }
    gerrit:  {
      url:  "https://chromium-review.googlesource.com"
      project:  "chromium/src"
      config:  CHROMIUM
    }
  }
  gitiles_child:  {
    gitiles:  {
      branch:  "refs/heads/chromium/{{.Branches.Chromium.Beta.Number}}"
      repo_url:  "https://chromium.googlesource.com/devtools/devtools-frontend.git"
    }
  }
}
