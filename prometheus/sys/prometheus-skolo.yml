scrape_configs:
# pulld for every server.
  - job_name: 'pulld-not-gce'
    static_configs:
      - targets: ['localhost:20000']
      - targets: ['192.168.1.198:20000']
        labels:
          instance_name: spare
      - targets: ['192.168.1.199:20000']
        labels:
          instance_name: master

  # Prometheus self monitoring.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:8000']


