groups:
- name: ../prometheus/sys/alert.rules
  rules:
  - alert: InstanceDown
    expr: up == 0
    for: 5m
    labels:
      category: infra
      severity: critical
    annotations:
      abbr: '{{ $labels.instance }}'
      description: '{{ $labels.instance }} of job {{ $labels.job }} has been down
        for more than 5 minutes. Logs: https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2F{{
        reReplaceAll `:[0-9]+` `` $labels.instance }}&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2F{{
        $labels.job }}'
  - alert: CrashLoop
    expr: max_over_time(liveness_uptime_s[6m]) < 60 * 3
    for: 5m
    labels:
      category: infra
      severity: critical
    annotations:
      abbr: '{{ $labels.instance }}'
      description: '{{ $labels.instance }} of job {{ $labels.job }} is crashing on
        startup. Logs: https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2F{{
        reReplaceAll `:[0-9]+` `` $labels.instance }}&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2F{{
        $labels.job }}'
  - alert: ExcessiveLoad
    expr: max_over_time(load[6m]) > 200
    for: 5m
    labels:
      category: infra
      severity: critical
    annotations:
      abbr: '{{ $labels.host }}'
      description: '{{ $labels.host }} is experiencing excessive {{ $labels.sub }}
        load. Logs: https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=200&expandAll=false&resource=logging_log%2Fname%2F{{
        $labels.host }}'
  - alert: TooManyGoRoutines
    expr: go_goroutines > 3000
    for: 2m
    labels:
      category: infra
      severity: warning
    annotations:
      description: 'Too many Go routines in {{ $labels.job }} running on {{ $labels.instance
        }}. Logs: https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=400&expandAll=false&resource=logging_log%2Fname%2F{{
        reReplaceAll `:[0-9]+` `` $labels.instance }}&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2F{{
        $labels.job }}'
      summary: Too many Go routines in {{ $labels.job }}
  - alert: ProbeFailure
    expr: prober{type="failure"} > 0
    for: 5m
    labels:
      category: infra
      severity: critical
    annotations:
      abbr: '{{ $labels.probename }} {{ $labels.url }}'
      description: Endpoint {{ $labels.probename }} {{ $labels.url }} has failed to
        respond in at least 5 minutes. See https://github.com/google/skia-buildbot/search?q={{
        $labels.probename }}+filename%3Aprobers.json5 for the endpoint URL.
  - alert: RebootRequired
    expr: reboot_required_i > 0
    labels:
      category: infra
      severity: warning
    annotations:
      abbr: '{{ $labels.host }}'
      description: 'Instance {{ $labels.host }} needs rebooting. Owner(s): {{ $labels.owners
        }}. See https://mon.skia.org/dashboard/db/reboots-required for the full list
        of instances that need rebooting.'
  - alert: DiskSpaceLow
    expr: df_complex_free{host!~".*rpi-.+",resource="df-root"} < 1e+09
    for: 5m
    labels:
      category: infra
      severity: warning
    annotations:
      abbr: '{{ $labels.host }}'
      description: Low Root Disk Space on {{ $labels.host }}.
  - alert: DiskSpaceLow
    expr: df_complex_free{resource=~"df-mnt-.*"} < 1e+10
    for: 5m
    labels:
      category: infra
      severity: warning
    annotations:
      abbr: '{{ $labels.host }}'
      description: Low Disk Space on {{ $labels.host }} on disk {{ $labels.resource
        }}.
  - alert: DiskSpaceLow
    expr: df_complex_free{host!~".*rpi-.+",resource="df-b"} < 2e+10
    for: 5m
    labels:
      category: infra
      severity: warning
    annotations:
      abbr: '{{ $labels.host }}'
      description: |-
        Free space has fallen below 20GB on {{ $labels.host }} drive {{ $labels.resource }}.

        Try running:
        go run scripts/run_on_swarming_bots/run_on_swarming_bots.go --alsologtostderr --script=scripts/run_on_swarming_bots/delete_out_dirs.py --dimension id:{{ $labels.host }}
  - alert: DiskSpaceLow
    expr: df_complex_free{host=~"skia-rpi-.+",resource=~"df-var|df-tmp"} < 1e+08
    for: 5m
    labels:
      category: infra
      severity: warning
    annotations:
      abbr: '{{ $labels.host }}'
      description: Free space has fallen below 100MB on {{ $labels.host }} drive {{
        $labels.resource}}.
  - alert: DirtyPackages
    expr: min_over_time(dirty_packages[25h]) >= 1
    labels:
      category: infra
      severity: warning
    annotations:
      description: One or more dirty packages have been running for more than 24 hours.
        https://push.skia.org
  - alert: PackageInstall
    expr: rate(pulld_failed_install[10m]) > 1
    labels:
      category: infra
      severity: warning
    annotations:
      abbr: '{{ $labels.host }}'
      description: Package failing to install via pulld on {{ $labels.host }}.
  - alert: TooManyOpenFDs
    expr: process_open_fds > 2000
    labels:
      category: infra
      severity: warning
    annotations:
      abbr: '{{ $labels.host }}'
      description: Too many open file handles on {{ $labels.host }}.
  - alert: CTPollerHealthCheck
    expr: healthy{instance="skia-ct-master:20000",job="ct-poller"} != 1
    for: 5m
    labels:
      category: infra
      severity: critical
    annotations:
      description: CT poller health check is failing. https://skia.googlesource.com/buildbot/%2B/master/ct/PROD.md#ct_poller_health_check
      summary: CT poller healthy check failed.
  - alert: CTFEPendingTaskCount
    expr: num_pending_tasks{instance="skia-ctfe:20000",job="ctfe"} >= 10
    for: 5m
    labels:
      category: infra
      severity: critical
    annotations:
      description: There are a lot of CTFE pending tasks. https://skia.googlesource.com/buildbot/%2B/master/ct/PROD.md#ctfe_pending_tasks
      summary: CTFE pending task count too high.
  - alert: CTFEPendingTaskStatus
    expr: oldest_pending_task_status{instance="skia-ctfe:20000",job="ctfe"} >= 2
    for: 5m
    labels:
      category: infra
      severity: critical
    annotations:
      description: A task has been waiting to be executed for a while and it's still
        not started. https://skia.googlesource.com/buildbot/%2B/master/ct/PROD.md#ctfe_pending_tasks
      summary: CTFE pending task not running.
  - alert: CTFEErrorRate
    expr: rate(num_log_lines{level="ERROR",log_source="ctfe"}[2m]) > 0.1
    for: 2m
    labels:
      category: infra
      severity: critical
    annotations:
      description: The error rate for CTFE is too high. See cloud logging for skia-ctfe.
        https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2F{{
        $labels.log_group }}&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2F{{
        $labels.log_source }}
      summary: CTFE error rate too high.
  - alert: AndroidCompileTooManyWaitingTasks
    expr: android_compile_waiting_tasks{instance="android-compile:20000",job="android_compile"}
      >= 5
    for: 5m
    labels:
      category: infra
      severity: warning
    annotations:
      description: There are 5 or more waiting tasks on android-compile.skia.org.
        https://skia.googlesource.com/buildbot/%2B/master/android_compile/PROD.md#queue_too_long
      summary: Too many waiting tasks on android-compile.skia.org
  - alert: AndroidCompileTreeBroken
    expr: android_compile_waiting_tasks{instance="android-compile:20000",job="android_compile"}
      > 0
    for: 5m
    labels:
      category: infra
      severity: warning
    annotations:
      description: Android tree is broken. https://skia.googlesource.com/buildbot/%2B/master/android_compile/PROD.md#android_tree_broken
      summary: Android tree is broken
  - alert: AndroidCompileInfraFailure
    expr: android_compile_infra_failure{instance="android-compile:20000",job="android_compile"}
      > 0
    for: 5m
    labels:
      category: infra
      severity: critical
    annotations:
      description: Infra failure in Android compile bot. https://skia.googlesource.com/buildbot/%2B/master/android_compile/PROD.md#infra_failure
      summary: Infra failure in Android compile bot
  - alert: CQWatcherCLsCount
    expr: cq_watcher_in_flight_waiting_in_cq{instance="skia-cq-watcher:20000",job="cq_watcher"}
      >= 10
    for: 5m
    labels:
      category: infra
      severity: warning
    annotations:
      description: There are 10 CLs or more in Skia's CL. https://skia.googlesource.com/buildbot/%2B/master/cq_watcher/PROD.md#too_many_cls
      summary: Too many CLs in CQ.
  - alert: CQWatcherTrybotDuration
    expr: max_over_time(cq_watcher_in_flight_trybot_duration{instance="skia-cq-watcher:20000",job="cq_watcher"}[20m])
      > 2700
    labels:
      category: infra
      severity: warning
    annotations:
      description: '{{ $labels.trybot }} ran longer than 45 mins. Playbook: https://skia.googlesource.com/buildbot/%2B/master/cq_watcher/PROD.md#trybot_duration_beyond_threshold
        Direct link to logs: https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2Fskia-cq-watcher&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2Fcq_watcher&filters=text:CQTrybotDurationError'
      summary: CQ trybot running for too long.
  - alert: CQWatcherTrybotsCount
    expr: max_over_time(cq_watcher_in_flight_trybot_num{instance="skia-cq-watcher:20000",job="cq_watcher"}[20m])
      > 35
    labels:
      category: infra
      severity: warning
    annotations:
      description: 'There are more than 35 CQ trybots triggered by at least one CL.
        Playbook: https://skia.googlesource.com/buildbot/%2B/master/cq_watcher/PROD.md#too_many_trybots_triggered
        Direct link to logs: https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2Fskia-cq-watcher&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2Fcq_watcher&filters=text:CQCLsCountError'
      summary: Too many CQ trybots triggered by CL.
  - alert: PerfUntriagedClusters
    expr: perf_clustering_untriaged{instance="skia-perf:20000"} > 0
    labels:
      category: general
      severity: warning
    annotations:
      description: At least one untriaged perf cluster has been found. Please visit
        https://perf.skia.org/t/ to triage.
      summary: One or more untriaged clusters.
  - alert: AndroidPerfUntriagedClusters
    expr: perf_clustering_untriaged{instance=~"skia-android-perf:20000"} > 0
    labels:
      category: general
      severity: warning
      specialroute: android
    annotations:
      description: At least one untriaged perf cluster has been found. Please visit
        https://{{ $labels.subdomain }}.skia.org/t/ to triage.
      summary: One or more untriaged clusters.
  - alert: AndroidMasterPerfUntriagedClusters
    expr: perf_clustering_untriaged{instance=~"skia-android-master-perf:20000"} >
      0
    labels:
      category: general
      severity: warning
      specialroute: android-master
    annotations:
      description: At least one untriaged perf cluster has been found. Please visit
        https://{{ $labels.subdomain }}.skia.org/t/ to triage.
      summary: One or more untriaged clusters.
  - alert: AndroidIngestFailures
    expr: rate(process_failures[2m]) > 0.1
    labels:
      category: infra
      severity: critical
    annotations:
      description: Error rate for processing buildids is too high. See https://github.com/google/skia-buildbot/blob/master/android_ingest/PROD.md#process_failures
  - alert: PerfIngestErrorTooHigh
    expr: rate(ingestion{metric="errors"}[5m]) > 1
    labels:
      category: infra
      severity: critical
    annotations:
      description: Perf ingestion error rate too high. See https://prom.skia.org/graph?g0.range_input=1h&g0.expr=rate(ingestion%7Bmetric%3D%22errors%22%7D%5B5m%5D)&g0.tab=0
  - alert: BuildsFailed
    expr: builds_failed >= 2
    labels:
      category: infra
      severity: warning
    annotations:
      abbr: '{{ $labels.job }}'
      description: Build for {{ $labels.job }} has failed for the last 2 chrome DEPS
        rolls. https://skia.googlesource.com/buildbot/%2B/master/{{ $labels.job }}/PROD.md#build_fail
  - alert: SyncFailed
    expr: repo_sync_failed >= 2
    labels:
      category: infra
      severity: warning
    annotations:
      abbr: '{{ $labels.job }}'
      description: Sync for {{ $labels.job }} has failed 2 times in a row. https://skia.googlesource.com/buildbot/%2B/master/{{
        $labels.job }}/PROD.md#sync_fail
  - alert: NamedFiddles
    expr: named_failures > 0
    labels:
      category: infra
      severity: warning
    annotations:
      description: See https://fiddle.skia.org/f/ and https://skia.googlesource.com/buildbot/%2B/master/fiddle/PROD.md#named_fail
  - alert: DatahopperErrorRate
    expr: rate(num_log_lines{level="ERROR",log_source="datahopper"}[10m]) > 5
    labels:
      category: infra
      severity: critical
    annotations:
      description: The error rate for datahopper is too high. https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2Fskia-datahopper2&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2Fdatahopper
  - alert: JobMetricsLiveness
    expr: liveness_last_successful_job_metrics_update_s / 60 > 30
    labels:
      category: infra
      severity: critical
    annotations:
      description: '{{ $labels.instance }} has failed to update job metrics for the
        last 30 minutes. https://skia.googlesource.com/buildbot/%2B/master/datahopper/PROD.md#job_metrics'
      summary: Job metrics update is failing ({{ $labels.instance }})
  - alert: BotCoverageMetricsLiveness
    expr: liveness_last_successful_bot_coverage_metrics_s / 60 > 60
    labels:
      category: infra
      severity: critical
    annotations:
      description: '{{ $labels.instance }} has failed to update bot coverage metrics
        for the last 1 hour. https://skia.googlesource.com/buildbot/%2B/master/datahopper/PROD.md#bot_coverage_metrics'
      summary: Bot coverage metrics update is failing ({{ $labels.instance }})
  - alert: SwarmingTaskMetricsLiveness
    expr: liveness_last_successful_swarming_task_metrics_s / 60 > 60
    labels:
      category: infra
      severity: critical
    annotations:
      description: '{{ $labels.instance }} has failed to update swarming task metrics
        for the last 1 hour. https://skia.googlesource.com/buildbot/%2B/master/datahopper/PROD.md#swarming_task_metrics'
      summary: Swarming task metrics update is failing ({{ $labels.instance }})
  - alert: EventMetricsLiveness
    expr: liveness_last_successful_event_metrics_update_s / 60 > 30
    labels:
      category: infra
      severity: critical
    annotations:
      description: '{{ $labels.instance }} has failed to update event metrics for
        {{ $labels.measurement }} for the last 30 minutes. https://skia.googlesource.com/buildbot/%2B/master/datahopper/PROD.md#event_metrics'
      summary: Event metrics update is failing ({{ $labels.instance }})
  - alert: BotMissing
    expr: swarming_bots_last_seen{bot!~"(ct-gce-.*)|(build4.+device.+)"} / 1000 /
      1000 / 1000 / 60 > 15
    labels:
      category: infra
      severity: critical
    annotations:
      abbr: '{{ $labels.bot }}'
      description: Swarming bot {{ $labels.bot }} is missing. https://{{ $labels.swarming
        }}/bot?id={{ $labels.bot }} https://goto.google.com/skolo-maintenance
  - alert: CtGceBotMissing
    expr: max(swarming_bots_last_seen{bot=~"ct-gce-.*"}) / 1024 / 1024 / 1024 / 60
      * max(ct_gce_bots_up) > 15
    labels:
      category: infra
      severity: critical
    annotations:
      description: '1 or more CT GCE bots are down: https://chrome-swarming.appspot.com/botlist?f=status%3Adead&f=gpu%3Anone&f=pool%3ACT&l=100'
  - alert: GoloBotMissing
    expr: swarming_bots_last_seen{bot=~"build4.+device.+"} / 1000 / 1000 / 1000 /
      60 / 60 / 24 > 14
    labels:
      category: infra
      severity: critical
    annotations:
      abbr: '{{ $labels.bot }}'
      description: Golo Swarming bot {{ $labels.bot }} is missing and hasn't been
        fixed in 2 weeks. Probably time to file a bug. https://{{ $labels.swarming
        }}/bot?id={{ $labels.bot }} https://goto.google.com/skolo-maintenance#heading=h.hc5mjpv8qfqo
  - alert: BotUnemployed
    expr: swarming_bots_last_task{pool=~"Skia.*"} / 1000 / 1000 / 1000 / 60 / 60 >=
      72
    labels:
      category: infra
      severity: critical
    annotations:
      abbr: '{{ $labels.bot }}'
      description: Swarming bot {{ $labels.bot }} hasn't run a job in 72 hours. Maybe
        its dimensions need changing? https://{{ $labels.swarming }}/bot?id={{ $labels.bot
        }} https://goto.google.com/skolo-maintenance
  - alert: BotQuarantined
    expr: avg_over_time(swarming_bots_quarantined{bot!~"build4.+device.+"}[10m]) >=
      1
    labels:
      category: infra
      severity: critical
    annotations:
      abbr: '{{ $labels.bot }}'
      description: Swarming bot {{ $labels.bot }} is quarantined. https://{{ $labels.swarming
        }}/bot?id={{ $labels.bot }} https://goto.google.com/skolo-maintenance
  - alert: GoloBotQuarantined
    expr: avg_over_time(swarming_bots_quarantined{bot=~"build4.+device.+"}[2w]) >=
      0.95
    labels:
      category: infra
      severity: critical
    annotations:
      abbr: '{{ $labels.bot }}'
      description: Golo swarming bot {{ $labels.bot }} is quarantined and hasn't been
        fixed in 2 weeks. Probably time to file a bug. https://{{ $labels.swarming
        }}/bot?id={{ $labels.bot }} https://goto.google.com/skolo-maintenance#heading=h.hc5mjpv8qfqo
  - alert: SwarmingLoggerErrorRate
    expr: rate(num_log_lines{level="ERROR",log_source="swarming_logger"}[10m]) > 1
    labels:
      category: infra
      severity: critical
    annotations:
      description: The error rate for swarming_logger is too high. https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2Fskia-swarming-logger2&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2Fswarming_logger
  - alert: FuzzerUploadQueue
    expr: fuzzer_queue_size_upload > 90
    for: 2m
    labels:
      category: infra
      severity: critical
    annotations:
      description: Fuzzer upload queue has been very full on {{ $labels.host }}. https://skia.googlesource.com/buildbot/%2B/master/fuzzer/PROD.md#full_upload
  - alert: FuzzerAnalysisQueue
    expr: fuzzer_queue_size_analysis > 900000
    for: 2m
    labels:
      category: infra
      severity: critical
    annotations:
      description: Fuzzer analysis queue has been very full on {{ $labels.host }}.
        https://skia.googlesource.com/buildbot/%2B/master/fuzzer/PROD.md#full_analysis
  - alert: FuzzerStaleVersion
    expr: fuzzer_version_age{type="current"} / 60 / 60 / 24 > 10
    labels:
      category: infra
      severity: critical
    annotations:
      description: The Fuzzer hasn't rolled its version forward in 10 days.  Roll
        it forward on fuzzer.skia.org https://skia.googlesource.com/buildbot/%2B/master/fuzzer/PROD.md#stale_version
  - alert: FuzzerSlowRoll
    expr: fuzzer_version_age{type="pending"} / 60 / 60 > 2
    labels:
      category: infra
      severity: critical
    annotations:
      description: The fuzzer hasn't finished rolling its version forward in 2 hours.  Something
        might be wrong.  https://skia.googlesource.com/buildbot/%2B/master/fuzzer/PROD.md#broken_roll
  - alert: StatusLatency
    expr: avg_over_time(prober{probename="skiastatus_json",type="latency"}[10m]) /
      1024 > 10
    labels:
      category: infra
      severity: critical
    annotations:
      description: The JSON endpoint at https://status.skia.org/json/skia/commits/
        took more than 10s to respond.
  - alert: StatusIncrementalCacheUpdate
    expr: liveness_last_successful_incremental_cache_update_s > 5 * 60
    labels:
      category: infra
      severity: critical
    annotations:
      description: 'IncrementalCache UpdateLoop on {{ $labels.instance }} has failed
        to update data for more than 5 minutes. Playbook: Logs: https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2F{{
        reReplaceAll `:[0-9]+` `` $labels.instance }}&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2Fstatus'
  - alert: ProberLiveness
    expr: liveness_probes_s / 60 > 10
    labels:
      category: infra
      severity: critical
    annotations:
      description: Probing has failed to run in at least 10 minutes.
  - alert: IssueTrackerLiveness
    expr: liveness_issue_tracker_s / 60 > 30
    labels:
      category: infra
      severity: critical
    annotations:
      description: Issue tracker ingestion has failed to run in at least 30 minutes.
  - alert: SkiaAutoRoll
    expr: autoroll_last_roll_result{instance="skia-autoroll:20000"} == 0
    for: 10m
    labels:
      category: general
      severity: warning
    annotations:
      description: The last DEPS roll attempt for Skia failed. https://skia.googlesource.com/buildbot/%2B/master/autoroll/PROD.md#autoroll_failed
  - alert: SkiaAutoRoll24H
    expr: liveness_last_autoroll_landed_s{instance="skia-autoroll:20000"} / 60 / 60
      > 24
    labels:
      category: general
      severity: warning
    annotations:
      description: The last-landed AutoRoll for Skia was over 24h ago. https://skia.googlesource.com/buildbot/%2B/master/autoroll/PROD.md#no_rolls_24h
  - alert: Google3AutoRoll
    expr: autoroll_last_roll_result{instance="google3-autoroll:20000"} == 0
    for: 10m
    labels:
      category: general
      severity: warning
    annotations:
      description: The last Google3 roll attempt for Skia failed. https://sites.google.com/a/google.com/skia-infrastructure/docs/google3-autoroller
  - alert: Google3AutoRoll24H
    expr: liveness_last_autoroll_landed_s{instance="google3-autoroll:20000"} / 60
      / 60 > 24
    labels:
      category: general
      severity: warning
    annotations:
      description: The last-landed Google3 roll for Skia was over 24h ago. https://skia.googlesource.com/buildbot/%2B/master/autoroll/PROD.md#no_rolls_24h
  - alert: InternalAutoRoll
    expr: autoroll_last_roll_result{instance="skia-internal-autoroll:20000"} == 0
    for: 10m
    labels:
      category: infra
      severity: warning
    annotations:
      description: The last DEPS roll into internal_test repo failed. https://skia.googlesource.com/buildbot/%2B/master/autoroll/PROD.md#autoroll_failed
  - alert: InternalAutoRoll24H
    expr: liveness_last_autoroll_landed_s{instance="skia-internal-autoroll:20000"}
      / 60 / 60 > 24
    labels:
      category: infra
      severity: warning
    annotations:
      description: The last-landed roll into internal_test was over 24h ago. https://skia.googlesource.com/buildbot/%2B/master/autoroll/PROD.md#no_rolls_24h
  - alert: AutoRollLatency
    expr: prober{probename="autoroll",type="latency"} > 200
    for: 10m
    labels:
      category: infra
      severity: critical
    annotations:
      description: The endpoint for {{ $labels.probename }} {{ $labels.url }} took
        more than 200ms to respond. https://skia.googlesource.com/buildbot/%2B/master/autoroll/PROD.md#http_latency
  - alert: AutoRollErrorRate
    expr: rate(num_log_lines{level="ERROR",log_source="autoroll"}[1h]) > 0.001
    labels:
      category: infra
      severity: critical
    annotations:
      description: The error rate for autoroll on {{ $labels.instance }} is too high.
        https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2F{{
        $labels.log_group }}&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2F{{
        $labels.log_source }} https://skia.googlesource.com/buildbot/%2B/master/autoroll/PROD.md#error_rate
  - alert: AutoRollLastTransition
    expr: liveness_last_successful_autoroll_tick_s{instance!="skia-flutter-autoroll:20000"}
      > 10 * 60
    labels:
      category: infra
      severity: critical
    annotations:
      description: Autoroll on {{ $labels.instance }} has failed to transition for
        more than 10 minutes. https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2F{{
        reReplaceAll `:[0-9]+` `` $labels.instance }}&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2Fautoroll
  - alert: AutoRollLastTransition
    expr: liveness_last_successful_autoroll_tick_s{instance="skia-flutter-autoroll:20000"}
      > 30 * 60
    labels:
      category: infra
      severity: critical
    annotations:
      description: Autoroll on {{ $labels.instance }} has failed to transition for
        more than 30 minutes. https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2F{{
        reReplaceAll `:[0-9]+` `` $labels.instance }}&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2Fautoroll
  - alert: GoldUntriaged
    expr: gold_status_by_corpus{instance="skia-gold-prod:20001",type="untriaged"}
      > 0
    labels:
      category: general
      severity: warning
    annotations:
      description: At least one untriaged GM has been found. Please visit https://gold.skia.org/
        to triage.
  - alert: GoldExpiredIgnores
    expr: gold_num_expired_ignore_rules{instance="skia-gold-prod:20001"} > 0
    labels:
      category: general
      severity: warning
    annotations:
      description: At least one expired ignore rule has been found. Please visit https://gold.skia.org/ignores
        to delete or extend.
  - alert: GoldIgnoreMonitoring
    expr: liveness_gold_expired_ignore_rules_monitoring_s{instance="skia-gold-prod:20001"}
      > 200
    labels:
      category: infra
      severity: critical
    annotations:
      description: At least two rounds of monitoring for expired ignore rules have
        failed back to back.
  - alert: GoldErrorRate
    expr: rate(num_log_lines{job=~"skiacorrectness-.*",level="ERROR"}[2m]) > 1
    labels:
      category: infra
      severity: critical
    annotations:
      description: The error rate for Gold {{ $labels.instance }} is too high. https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2F{{
        $labels.log_group }}&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2F{{
        $labels.log_source }}
  - alert: GoldDiffServerErrorRate
    expr: rate(num_log_lines{instance="skia-diffserver-prod:20000",level="ERROR"}[2m])
      > 1
    labels:
      category: infra
      severity: critical
    annotations:
      description: The error rate for Gold Diffserver {{ $labels.instance }} is too
        high. https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2F{{
        $labels.log_group }}&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2F{{
        $labels.log_source }}
  - alert: GoldIngestionStalled
    expr: liveness_gold_s{metric="since-last-run",source="poll"} > 750
    labels:
      category: infra
      severity: critical
    annotations:
      description: At least two rounds of gold ingestion have failed back to back
        for {{ $labels.corpus }}. See https://mon.skia.org/dashboard/db/gold-panel
  - alert: GoldIngestionErrorRate
    expr: rate(num_log_lines{job=~".*_ingestion",level="ERROR"}[2m]) > 1
    labels:
      category: infra
      severity: critical
    annotations:
      description: The error rate for Gold Ingestion {{ $labels.corpus }} is too high.
        See https://mon.skia.org/dashboard/db/gold-panel https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2F{{
        $labels.log_group }}&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2F{{
        $labels.log_source }}
  - alert: TaskSchedulerLiveness
    expr: liveness_last_successful_task_scheduling_s / 60 > 10
    labels:
      category: infra
      severity: critical
    annotations:
      description: '{{ $labels.instance }} has failed to schedule for the last 10
        minutes. https://skia.googlesource.com/buildbot/%2B/master/task_scheduler/PROD.md#scheduling_failed'
      summary: Task Scheduler Failing ({{ $labels.instance }})
  - alert: TaskSchedulerLatency
    expr: prober{probename="task_scheduler",type="latency"} > 300
    for: 10m
    labels:
      category: infra
      severity: critical
    annotations:
      description: The endpoint for {{ $labels.probename }} took more than 300ms to
        respond. https://skia.googlesource.com/buildbot/%2B/master/task_scheduler/PROD.md#http_latency
      summary: Task Scheduler HTTP Latency
  - alert: TaskSchedulerErrorRate
    expr: rate(num_log_lines{level="ERROR",log_source="task_scheduler"}[2m]) > 0.05
    for: 2m
    labels:
      category: infra
      severity: critical
    annotations:
      description: The error rate for task_scheduler on {{ $labels.instance }} is
        too high. https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2F{{
        $labels.log_group }}&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2F{{
        $labels.log_source }} https://skia.googlesource.com/buildbot/%2B/master/task_scheduler/PROD.md#error_rate
      summary: Task Scheduler Error Rate ({{ $labels.instance }})
  - alert: TaskSchedulerDBBackup
    expr: liveness_last_db_backup_s / 60 / 60 > 25
    labels:
      category: infra
      severity: critical
    annotations:
      description: The last Task Scheduler DB backup on {{ $labels.instance }} was
        more than 25 hours ago. https://skia.googlesource.com/buildbot/%2B/master/task_scheduler/PROD.md#old_db_backup
      summary: Task Scheduler DB backup ({{ $labels.instance }})
  - alert: TaskSchedulerExtraDBBackups
    expr: recent_db_backup_count > 9
    labels:
      category: infra
      severity: critical
    annotations:
      description: There are too many recent Task Scheduler DB backups for {{ $labels.instance
        }}. https://skia.googlesource.com/buildbot/%2B/master/task_scheduler/PROD.md#too_many_recent_db_backups
      summary: Task Scheduler extra DB backups ({{ $labels.instance }})
  - alert: TaskSchedulerDBBackupTrigger
    expr: liveness_db_backup_maybe_backup_db_s / 60 > 10
    labels:
      category: infra
      severity: critical
    annotations:
      description: The last time we checked for a Task Scheduler DB backup trigger
        file on {{ $labels.instance }} was more than 10 minutes ago. https://skia.googlesource.com/buildbot/%2B/master/task_scheduler/PROD.md#db_backup_trigger_liveness
      summary: Task Scheduler DB backup trigger ({{ $labels.instance }})
  - alert: TaskSchedulerIncrementalBackup
    expr: liveness_incremental_backup_s / 60 > 10
    labels:
      category: infra
      severity: critical
    annotations:
      description: The last time a Task Scheduler incremental backup succeeded on
        {{ $labels.instance }} was more than 10 minutes ago. https://skia.googlesource.com/buildbot/%2B/master/task_scheduler/PROD.md#incremental_backup_liveness
      summary: Task Scheduler incremental backup ({{ $labels.instance }})
  - alert: TaskSchedulerIncrementalBackupReset
    expr: incremental_backup_reset > 0
    labels:
      category: infra
      severity: critical
    annotations:
      description: Task Scheduler modified job tracking for incremental backups has
        been reset since last full backup on {{ $labels.instance }}. https://skia.googlesource.com/buildbot/%2B/master/task_scheduler/PROD.md#incremental_backup_reset
      summary: Task Scheduler incremental backup reset ({{ $labels.instance }})
  - alert: TaskSchedulerDBFreePages
    expr: avg_over_time(bolt_db{database="task_scheduler_db",instance!="skia-task-scheduler-internal:20000",metric="FreePageCount"}[30m])
      > 1000
    for: 1h
    labels:
      category: infra
      severity: critical
    annotations:
      description: There are a large number of free pages in the Task Scheduler DB
        on {{ $labels.instance }}. https://skia.googlesource.com/buildbot/%2B/master/task_scheduler/PROD.md#db_too_many_free_pages
      summary: Task Scheduler DB excess free pages ({{ $labels.instance }})
  - alert: DbMetricsLiveness
    expr: liveness_DbMetric_s / 60 > 30
    labels:
      category: infra
      severity: critical
    annotations:
      description: '{{ $labels.instance }} has failed to update boltutil.DbMetrics
        for the last 30 minutes. Logs: https://console.cloud.google.com/logs/viewer?project=google.com:skia-buildbots&minLogLevel=500&expandAll=false&resource=logging_log%2Fname%2F{{
        reReplaceAll `:[0-9]+` `` $labels.instance }}&logName=projects%2Fgoogle.com:skia-buildbots%2Flogs%2F{{
        $labels.job }}'
      summary: DbMetrics update is failing ({{ $labels.instance }})
  - alert: NightlyTrigger
    expr: liveness_periodic_trigger_s{trigger="nightly"} / 60 / 60 > 25
    labels:
      category: infra
      severity: critical
    annotations:
      description: The nightly trigger has not run in over 25 hours on {{ $labels.instance
        }}. https://skia.googlesource.com/buildbot/%2B/master/task_scheduler/PROD.md#trigger_nightly
      summary: Nightly Trigger ({{ $labels.instance }})
  - alert: WeeklyTrigger
    expr: liveness_periodic_trigger_s{trigger="weekly"} / 60 / 60 / 24 > 8
    labels:
      category: infra
      severity: critical
    annotations:
      description: The weekly trigger has not run in over 8 days on {{ $labels.instance
        }}. https://skia.googlesource.com/buildbot/%2B/master/task_scheduler/PROD.md#trigger_weekly
      summary: Weekly Trigger ({{ $labels.instance }})
  - alert: BackupNotDone
    expr: liveness_skolo_last_backup_s / 60 / 60 > 25
    labels:
      category: infra
      severity: critical
    annotations:
      abbr: '{{ $labels.federated }} {{ $labels.backup }}'
      description: The automated backup of {{ $labels.backup }} was not completed
        by {{ $labels.federated }} in the last 25 hours. http://go/skolo-maintenance
  - alert: RpiMaster
    expr: skolo_hotspare_spare_active == 1
    labels:
      category: infra
      severity: critical
    annotations:
      description: skia-rpi-master-spare is active. Something is possibly wrong with
        skia-rpi-master. http://go/skolo-maintenance
  - alert: HighExternalQPS
    expr: sum by(host) (rate(http_request_metrics{host!="www.googleapis.com",job!="ct-poller",job!="skiaperf"}[30m]))
      > 25
    labels:
      category: infra
      severity: warning
    annotations:
      description: QPS to {{ $labels.host }} is high. Verify that this is expected.
        See https://mon.skia.org/dashboard/db/outgoing-qps
  - alert: HighExternalQPSCTPoller
    expr: sum by(host) (rate(http_request_metrics{job="ct-poller"}[30m])) > 20
    labels:
      category: infra
      severity: warning
    annotations:
      description: QPS to {{ $labels.host }} from the ct-poller is high. Verify that
        this is expected. See https://mon.skia.org/dashboard/db/outgoing-qps
  - alert: HighExternalQPSSkiaPerf
    expr: sum by(host) (rate(http_request_metrics{job="skiaperf"}[30m])) > 75
    labels:
      category: infra
      severity: warning
    annotations:
      description: QPS to {{ $labels.host }} from skiaperfd is high. Verify that this
        is expected. See https://mon.skia.org/dashboard/db/outgoing-qps
  - alert: HighExternalQPSGoogleAPIs
    expr: sum(rate(http_request_metrics{host="www.googleapis.com"}[30m])) > 60
    labels:
      category: infra
      severity: warning
    annotations:
      description: QPS to www.googleapis.com is high. Verify that this is expected.
        See https://mon.skia.org/dashboard/db/outgoing-qps
  - alert: HighQPSGerritSkiaShortTerm
    expr: rate(http_request_metrics{host="skia-review.googlesource.com"}[5m]) > 5
    labels:
      category: infra
      severity: warning
    annotations:
      description: Short-term QPS to Gerrit (Skia) is high. Verify that this is expected.
        See https://mon.skia.org/dashboard/db/outgoing-qps
  - alert: HighQPSGerritChromeShortTerm
    expr: rate(http_request_metrics{host="chromium-review.googlesource.com"}[5m])
      > 5
    labels:
      category: infra
      severity: warning
    annotations:
      description: Short-term QPS to Gerrit (Chromium) is high. Verify that this is
        expected. See https://mon.skia.org/dashboard/db/outgoing-qps
  - alert: HighQPSGerritSkiaLongTerm
    expr: rate(http_request_metrics{host="skia-review.googlesource.com"}[12h]) > 1
    labels:
      category: infra
      severity: warning
    annotations:
      description: Long-term QPS to Gerrit (Skia) is high. Verify that this is expected.
        See https://mon.skia.org/dashboard/db/outgoing-qps
  - alert: HighQPSGerritChromeLongTerm
    expr: rate(http_request_metrics{host="chromium-review.googlesource.com"}[12h])
      > 1
    labels:
      category: infra
      severity: warning
    annotations:
      description: Long-term QPS to Gerrit (Chromium) is high. Verify that this is
        expected. See https://mon.skia.org/dashboard/db/outgoing-qps
  - alert: Bootloop
    expr: avg_over_time(liveness_backup_step_s[5m]) < 60
    labels:
      category: infra
      severity: critical
    annotations:
      description: datastore_backup appears to be in a boot loop. https://skia.googlesource.com/buildbot/%2B/master/ds/PROD.md#boot_loop
  - alert: BackupNotDone
    expr: liveness_backup_success_s / 60 / 60 > 25
    labels:
      category: infra
      severity: critical
    annotations:
      description: A backup of Cloud Datastore hasn't succeeded in the last 25 hours.
        https://skia.googlesource.com/buildbot/%2B/master/ds/PROD.md#backup_not_done
  - alert: PredictLiveness
    expr: liveness_predict_processing_s / 60 > 120
    labels:
      category: infra
      severity: critical
    annotations:
      description: '{{ $labels.instance }} has failed to build a prediction model
        for the last 2 hours. https://skia.googlesource.com/buildbot/%2B/master/predict/PROD.md#build_liveness'
      summary: Predict model building is failing ({{ $labels.instance }})
  - alert: JSDocLiveness
    expr: liveness_build_s{instance="skia-jsdoc:20000"} / 60 > 120
    labels:
      category: infra
      severity: critical
    annotations:
      description: '{{ $labels.instance }} has failed to rebuild documentation for
        the last 2 hours. https://skia.googlesource.com/buildbot/%2B/master/jsdoc/PROD.md#build_liveness'
      summary: JSDoc documentation building is failing ({{ $labels.instance }})
