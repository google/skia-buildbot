apiVersion: apps/v1beta1
kind: Deployment
metadata:
  name: prober
spec:
  template:
    metadata:
      labels:
        app: prober
    spec:
      containers:
      - name: prober
        image: gcr.io/skia-public/proberd:2018-04-12T17_11_22Z-jcgregorio-d9b2b3491d070589ef0d68f3ccbeec4acda89411-dirty
        ports:
          - name: metrics
            containerPort: 20000
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: prober
  name: prober
spec:
  ports:
    - name: metrics
      protocol: TCP
      port: 20000
  selector:
    app: prober
  type: NodePort

