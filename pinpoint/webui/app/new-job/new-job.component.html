<div class="content">
  <h1 class="title">Create New Job</h1>
  <div class="card">
    <p class="desc">Form for a new Try job.</p>

    <div class="form-group">
      <label class="label">Configuration</label>
      <input class="input" type="text" value="win-11-perf"/>
    </div>

    <div class="form-group">
      <label class="label">Benchmark</label>
      <input class="input" type="text" value="speedometer3.1.crossbench"/>
    </div>

    <button class="btn" (click)="submitJob()">Submit Job</button>
  </div>
</div>
