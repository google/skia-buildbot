<mat-toolbar color="primary">
  <span>Pinpoint</span>
  <span class="spacer"></span>
  <button mat-icon-button (click)="onHelpClick()" aria-label="Help">
    <mat-icon>help</mat-icon>
  </button>
  <button mat-icon-button (click)="onBugClick()" aria-label="File a bug">
    <mat-icon>bug_report</mat-icon>
  </button>
  <button mat-icon-button (click)="onAvatarClick()" aria-label="User avatar">
    <mat-icon>account_circle</mat-icon>
  </button>
</mat-toolbar>
