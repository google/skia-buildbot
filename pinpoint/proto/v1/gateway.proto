syntax = "proto3";

package pinpoint.v1;

option go_package = "go.skia.org/infra/pinpoint/proto/v1;pinpointpb";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "validate/validate.proto";

// Supported types of Pinpoint jobs.
enum JobType {
  JOB_TYPE_UNSPECIFIED = 0;
  // Try jobs run on a specific Gerrit patch to measure performance differences.
  JOB_TYPE_TRY = 1;
  // Bisect jobs search for the culprit commit that introduced a performance regression.
  JOB_TYPE_BISECT = 2;
}

// Cursor-based pagination for navigating through the list of jobs page by page.
message Pagination {
  // Cursor pointing to the previous page of results.
  string prev_cursor = 1;
  // Cursor pointing to the next page of results.
  string next_cursor = 2;
  // Indicates if there is a previous page of results.
  optional bool has_prev = 3;
  // Indicates if there is a next page of results.
  optional bool has_next = 4;
}

// Request message to query a list of jobs with filters and pagination.
message QueryJobListRequest {
  // Query jobs created by the provided user email. If empty, returns jobs
  // created by any user. Must be a valid email address if set.
  string user = 1 [(validate.rules).string = {email: true, ignore_empty: true}];

  // Query jobs with the given bot/builder configuration. If empty, returns jobs
  // with any configuration. Must be a non-empty string if set.
  string configuration = 2 [(validate.rules).string = {min_len: 1, ignore_empty: true}];

  // Filter by the specific type of Pinpoint job.
  JobType job_type = 3 [(validate.rules).enum.defined_only = true];

  // Pagination options for the query.
  Pagination pagination = 4;
}

// Response message containing the queried list of jobs.
message QueryJobListResponse {
  // The list of job summaries matching the query filters.
  repeated JobSummary jobs = 1;
  // Pagination parameters for the next or previous page.
  Pagination pagination = 2;
}

// High-level status of a Pinpoint job.
enum JobStatus {
  JOB_STATUS_UNSPECIFIED = 0;
  // Job is queued and waiting for an available worker.
  JOB_STATUS_QUEUED = 1;
  // Job is currently running.
  JOB_STATUS_RUNNING = 2;
  // Job completed successfully.
  JOB_STATUS_COMPLETED = 3;
  // Job completed with a failure.
  JOB_STATUS_FAILED = 4;
  // Job was cancelled by a user or system action.
  JOB_STATUS_CANCELLED = 5;
}

// Summary of a Pinpoint job containing high-level metadata.
message JobSummary {
  // The unique identifier of the Pinpoint job.
  string job_id = 1;
  // The name of the job.
  string name = 2;
  // The Chrome performance benchmark name.
  string benchmark = 3;
  // The bot/builder configuration name used for the job (e.g. "win-11-perf").
  string configuration = 4;
  // The specific story or test case run by the job.
  string story = 5;
  // The type of Pinpoint job.
  JobType job_type = 6;
  // The email of the user who triggered the job.
  string user = 7;
  // The creation timestamp of the job.
  google.protobuf.Timestamp created = 8;
  // The current status of the job.
  JobStatus job_status = 9;
  // The bug ID associated with the job.
  optional int64 bug_id = 10;
}

// Request message to get information about the logged in user.
message GetUserInfoRequest {}

// Response message with information about the logged in user.
message GetUserInfoResponse {
  string email = 1;
}

// Extra arguments to pass to the benchmark or Chrome browser on run execution.
message ExtraArgs {
  // Extra command line arguments to pass directly to the benchmark runner execution.
  string benchmark_runner_args = 1;

  // Additional command line flags to pass to the Chrome browser on launch.
  // These flags will be wrapped inside --extra-browser-args.
  string extra_browser_args = 2;

  // V8 JavaScript engine flags to pass to Chrome.
  // These flags will be wrapped inside --js-flags.
  string js_flags = 3;

  // Chrome features to enable on launch.
  // These features will be wrapped inside --enable-features.
  string enable_features = 4;

  // Chrome features to disable on launch.
  // These features will be wrapped inside --disable-features.
  string disable_features = 5;
}

// Configuration for a job variant (e.g. base or experiment arm).
message VariantConfig {
  // Git commit hash, revision number, or  "HEAD".
  string commit = 1 [(validate.rules).string = {min_len: 1}];

  // Gerrit patch to apply to the commit.
  string patch = 2;

  // Extra browser or runner arguments specific to this variant.
  ExtraArgs extra_args = 3;
}

// Request message to create a new Pinpoint try job.
// A try job compares the performance between a base and an experiment variants.
message CreateTryJobRequest {
  // Chrome performance benchmark name.
  string benchmark = 1 [(validate.rules).string = {min_len: 1}];

  // Bot/builder configuration to run on (e.g., 'linux-perf').
  string configuration = 2 [(validate.rules).string = {min_len: 1}];

  // Story or benchmark sub-test to run.
  string story = 3;

  // Optional story tags to filter stories.
  string story_tags = 4;

  // Configuration for the base variant.
  VariantConfig base = 5 [(validate.rules).message.required = true];

  // Configuration for the experiment variant.
  VariantConfig experiment = 6 [(validate.rules).message.required = true];

  // The number of times to repeat the runs. Default is 30.
  int32 attempt_count = 7 [(validate.rules).int32 = {gt: 0}];

  // Optional bug ID associated with the job.
  optional int64 bug_id = 8;

  // Optional email of the user who triggered the job. If empty or not set, the
  // current user's email is used.
  string user = 9;

  // Optional name for the new try job.
  string job_name = 10;
}

// Response message containing the created job details or error.
message CreateJobResponse {
  // The unique identifier of the created Pinpoint job.
  string job_id = 1;
}

// Request message to list all available bots.
message ListBotConfigurationsRequest {}

// Response message containing the list of available bots.
message ListBotConfigurationsResponse {
  repeated string configurations = 1;
}

// Request message to list all available benchmarks.
message ListBenchmarksRequest {}

// Response message containing the list of available benchmarks.
message ListBenchmarksResponse {
  repeated string benchmarks = 1;
}

// Request message to get details of a benchmark (e.g. stories and story tags).
message GetBenchmarkInfoRequest {
  string benchmark = 1 [(validate.rules).string = {min_len: 1}];
}

// Response message containing stories and story tags for a benchmark.
message GetBenchmarkInfoResponse {
  string benchmark = 1;
  repeated string stories = 2;
  repeated string story_tags = 3;
}

// Request message to list recent builds for a bot configuration.
message ListRecentBuildsRequest {
  string configuration = 1 [(validate.rules).string = {min_len: 1}];
}

// Information about a Chrome build.
message BuildInfo {
  string git_hash = 1;
  int64 build_number = 2;
  google.protobuf.Timestamp created = 3;
}

// Response message containing the list of recent builds.
message ListRecentBuildsResponse {
  repeated BuildInfo builds = 1;
}

// Service definition for Pinpoint Gateway API.
service PinpointGateway {
  // Queries a list of jobs based on filters and pagination options.
  rpc QueryJobList(QueryJobListRequest) returns (QueryJobListResponse) {
    option (google.api.http) = {
      get: "/pinpoint/v1/jobs"
    };
  }

  // Retrieves information about the currently logged-in user.
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse) {
    option (google.api.http) = {
      get: "/pinpoint/v1/user"
    };
  }

  // Creates a new Pinpoint try job.
  rpc CreateTryJob(CreateTryJobRequest) returns (CreateJobResponse) {
    option (google.api.http) = {
      post: "/pinpoint/v1/new"
      body: "*"
    };
  }

  // Lists all available bots.
  rpc ListBotConfigurations(ListBotConfigurationsRequest) returns (ListBotConfigurationsResponse) {
    option (google.api.http) = {
      get: "/pinpoint/v1/bot-configurations"
    };
  }

  // Lists all available benchmarks.
  rpc ListBenchmarks(ListBenchmarksRequest) returns (ListBenchmarksResponse) {
    option (google.api.http) = {
      get: "/pinpoint/v1/benchmarks"
    };
  }

  // Retrieves details (stories and story tags) of a benchmark.
  rpc GetBenchmark(GetBenchmarkInfoRequest) returns (GetBenchmarkInfoResponse) {
    option (google.api.http) = {
      get: "/pinpoint/v1/benchmark-info/{benchmark}"
    };
  }

  // Lists recent builds for a given bot configuration.
  rpc ListRecentBuilds(ListRecentBuildsRequest) returns (ListRecentBuildsResponse) {
    option (google.api.http) = {
      get: "/pinpoint/v1/recent-builds/{configuration}"
    };
  }
}
