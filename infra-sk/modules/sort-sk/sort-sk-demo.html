<!DOCTYPE html>
<html>
<head>
  <title>sort-sk</title>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <h1>sort-sk</h1>
  <sort-sk target=stuffToBeSorted>
    <button data-key=clustersize data-default=down>Cluster Size</button>
    <button data-key=stepsize>Step Size</button>
  </sort-sk>

  <div id=stuffToBeSorted>
    <div data-clustersize=10 data-stepsize=1.2>Size=10 Step=1.2</div>
    <div data-clustersize=50 data-stepsize=0.5>Size=50 Step=0.5</div>
  </div>

</body>
</html>
